<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wąż</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#050a14;font-family:'Courier New',monospace;touch-action:none;}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding: 10px;}

    #ui{display:flex;gap:20px;padding:4px 0;color:#00d4ff;font-size:14px;letter-spacing:0.1em;flex-wrap:wrap;justify-content:center;width: 100%;margin-bottom: 5px;}
    #ui span b{color:#c8a84b;}
    #speedbar{display:flex;gap:6px;align-items:center;padding:2px 0;color:#8899aa;font-size:11px;flex-wrap:wrap;justify-content:center;margin-bottom: 10px;}

    #wrap{position:relative;width: 75vh; height: 75vh; max-width: 100%; max-height: 100%;}
    canvas{display:block;background:#050a14;border:3px solid rgba(0,212,255,0.4);border-radius:6px;box-shadow:0 0 30px rgba(0,212,255,0.2);width: 100%; height: 100%;}

    #overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#00d4ff;text-align:center;background:rgba(5,10,20,0.95);border-radius:4px;overflow-y:auto;padding:15px;}
    #overlay h2{font-size:28px;letter-spacing:0.2em;color:#c8a84b;}
    #overlay p{font-size:13px;color:#8899aa;line-height:1.6;}
    .speed-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
    .spd-btn{padding:8px 18px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.35);color:#00d4ff;font-family:'Courier New',monospace;font-size:13px;cursor:pointer;border-radius:4px;transition:all 0.2s;}
    .spd-btn.active{background:rgba(0,212,255,0.2);border-color:#00d4ff;color:#fff;}

    /* Ranking */
    #ranking{width:100%;max-width:340px;margin-top:4px;}
    #ranking table{width:100%;border-collapse:collapse;font-size:11px;color:#8899aa;}
    #ranking th{color:#c8a84b;padding:4px 6px;border-bottom:1px solid rgba(0,212,255,0.2);}
    #ranking td{padding:4px 6px;}
    #ranking tr.me td{color:#00d4ff;}
    #nickInput{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;font-family:'Courier New',monospace;font-size:14px;padding:6px 10px;border-radius:4px;width:160px;text-align:center;}

    /* Nowy układ paneli sterowania (Ukryty na komputerach) */
    #mobile-left-panel, #mobile-right-panel, #gPause {
      display: none;
    }

    .gp-row{display:flex;gap:6px;justify-content:center;}
    .gpbtn{width:58px;height:48px;background:rgba(0,212,255,0.12);border:2px solid rgba(0,212,255,0.35);color:#00d4ff;font-size:22px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;}
    .gpbtn:active{background:rgba(0,212,255,0.35);}
    .gpbtn.wide{width:100px; font-size: 11px; color: #8899aa;}
    
    .mid-pause{
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,212,255,0.3);
      color:#00d4ff;
      font-size:14px;
      border-radius:4px;
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      z-index: 10;
    }

    /* WERSJA PIONOWA (PORTRAIT) */
    @media(max-width: 767px) and (orientation: portrait) {
      body { justify-content: flex-start; padding-top: 20px; }
      #wrap { width: 92vw; height: 92vw; margin-bottom: 20px; }
      #gPause { display: block; }
      #mobile-left-panel { display: flex; flex-direction: column; position: fixed; bottom: 25px; left: 20px; }
      #mobile-right-panel { display: flex; flex-direction: column; position: fixed; bottom: 25px; right: 20px; }
    }

    /* WERSJA POZIOMA (LANDSCAPE - SZTYWNY UKŁAD DLA KCIUKÓW) */
    @media(max-width: 950px) and (orientation: landscape) {
      body { position: relative; flex-direction: row; justify-content: center; align-items: center; padding: 5px; height: 100vh; width: 100vw; }
      #ui { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: auto; font-size: 13px; z-index: 5; margin: 0; }
      #speedbar { display: none; } /* ukrywamy zbędny pasek prędkości w poziomie dla miejsca */
      #wrap { width: 72vh; height: 72vh; margin: 0 auto; }
      #gPause { display: block; }

      /* Lewy panel info/funkcyjny */
      #mobile-left-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: fixed;
        left: 25px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }
      
      /* Prawy panel - D-pad do ruchu */
      #mobile-right-panel {
        display: flex;
        flex-direction: column;
        gap: 6px;
        position: fixed;
        right: 25px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }
    }
  </style>
</head>
<body>

<div id="gPause" class="mid-pause">⏸</div>

<div id="ui">
  <span>WYNIK: <b id="score">0</b></span>
  <span>REKORD: <b id="best">0</b></span>
  <span>PRĘDKOŚĆ: <b id="curspeed">1</b></span>
</div>

<div id="speedbar">
  POZIOM: &nbsp;
  <button class="spd-btn active" id="s1" onclick="setStartSpeed(1)">1 WOLNO</button>
  <button class="spd-btn" id="s2" onclick="setStartSpeed(2)">2 ŚREDNIO</button>
  <button class="spd-btn" id="s3" onclick="setStartSpeed(3)">3 SZYBKO</button>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h2>🐍 WĄŻ</h2>
    <p>Strzałki / D-pad = ruch &nbsp;|&nbsp; Esc = pauza<br>Prędkość rośnie co 5 punktów</p>
    <div class="speed-btns">
      <button class="spd-btn active" id="o1" onclick="setStartSpeed(1)">1 WOLNO</button>
      <button class="spd-btn" id="o2" onclick="setStartSpeed(2)">2 ŚREDNIO</button>
      <button class="spd-btn" id="o3" onclick="setStartSpeed(3)">3 SZYBKO</button>
    </div>
    <input id="nickInput" type="text" maxlength="12" placeholder="Twój nick" autocomplete="off">
    <button class="spd-btn" id="startBtn">▶ ZAGRAJ</button>
    <div id="ranking"></div>
  </div>
</div>

<div id="mobile-left-panel">
  <div class="gp-row"><button class="gpbtn wide">KIERUNEK</button></div>
  <div class="gp-row"><button class="gpbtn wide" style="font-size:16px;">👉 🕹️</button></div>
</div>

<div id="mobile-right-panel">
  <div class="gp-row"><button class="gpbtn" id="gUp">▲</button></div>
  <div class="gp-row"><button class="gpbtn" id="gLeft">◀</button><button class="gpbtn" id="gRight">▶</button></div>
  <div class="gp-row"><button class="gpbtn" id="gDown">▼</button></div>
</div>

<script>
const COLS=20,ROWS=20,CELL=20;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=COLS*CELL; canvas.height=ROWS*CELL;

const overlay=document.getElementById('overlay');
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),curSpeedEl=document.getElementById('curspeed');

let menuHTML = overlay.innerHTML; // Zapamiętujemy szablon początkowy menu

// ── RANKING ──────────────────────────────────────────
function getScores(){try{return JSON.parse(localStorage.getItem('snake_scores')||'[]');}catch{return[];}}
function saveScore(nick,pts){
  let a=getScores(); a.push({nick:nick||'???',score:pts,date:new Date().toLocaleDateString('pl')});
  a.sort((x,y)=>y.score-x.score); a=a.slice(0,10);
  localStorage.setItem('snake_scores',JSON.stringify(a)); return a;
}
function renderRanking(hi=-1, customEl=null){
  const a=getScores(),el=customEl || document.getElementById('ranking');
  if(!el || !a.length){if(el)el.innerHTML='';return;}
  el.innerHTML=`<table><tr><th>#</th><th>Nick</th><th>Wynik</th></tr>${a.map((e,i)=>`<tr class="${i===hi?'me':''}"><td>${i+1}</td><td>${e.nick}</td><td>${e.score}</td></tr>`).join('')}</table>`;
}

// ── SPEED ─────────────────────────────────────────────
const SPEED_BASE=[null,291,200,127];
const SPEED_STEP=[null,20,14,9];
const SPEED_MIN=[null,109,82,55];
let startSpeed=1;
function setStartSpeed(n){
  startSpeed=n;
  [1,2,3].forEach(i=>{
    document.getElementById('s'+i)?.classList.toggle('active',i===n);
    document.getElementById('o'+i)?.classList.toggle('active',i===n);
  });
}

function getInterval(sc){return Math.max(SPEED_MIN[startSpeed],SPEED_BASE[startSpeed]-Math.floor(sc/5)*SPEED_STEP[startSpeed]);}

// ── GAME STATE ───────────────────────────────────────
let snake,dir,nextDir,food,score,best=0,loopId,running=false,paused=false;

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; scoreEl.textContent=0;
  curSpeedEl.textContent=startSpeed;
  placeFood();
}
function placeFood(){
  let p;
  do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y));
  food=p;
}
function restartLoop(){clearInterval(loopId);loopId=setInterval(step,getInterval(score));}

function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++; scoreEl.textContent=score;
    if(score>best){best=score;bestEl.textContent=best;}
    curSpeedEl.textContent=startSpeed+Math.floor(score/5);
    if(score%5===0){placeFood();restartLoop();return;}
    placeFood();
  } else {snake.pop();}
  draw();
}

function draw(){
  ctx.fillStyle='#050a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,212,255,0.04)';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
  ctx.fillStyle='#c8a84b';ctx.shadowColor='#c8a84b';ctx.shadowBlur=10;
  ctx.fillRect(food.x*CELL+2,food.y*CELL+2,CELL-4,CELL-4);ctx.shadowBlur=0;
  snake.forEach((s,i)=>{
    const r=1-i/snake.length;
    ctx.fillStyle=i===0?'#00d4ff':`rgba(0,${Math.floor(150*r+50)},${Math.floor(200*r+55)},${0.4+r*0.6})`;
    ctx.shadowColor=i===0?'#00d4ff':'transparent';ctx.shadowBlur=i===0?8:0;
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
  });ctx.shadowBlur=0;
}

function setupMainMenuBindings() {
  const btn = document.getElementById('startBtn');
  if(btn) {
    btn.addEventListener('click', startGame);
  }
}

function gameOver(){
  clearInterval(loopId);running=false;
  const nickInputCurrent = document.getElementById('nickInput');
  const nick = (nickInputCurrent ? nickInputCurrent.value.trim() : '') || '???';
  
  const arr=score>0?saveScore(nick,score):getScores();
  const hi=arr.findIndex(e=>e.nick===nick&&e.score===score);
  
  overlay.innerHTML='';
  const div=document.createElement('div');
  div.style.cssText='display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px;width:100%;';
  div.innerHTML=`
    <h2 style="color:#c8a84b;letter-spacing:0.2em;font-size:26px;">KONIEC GRA</h2>
    <p style="color:#8899aa;font-size:14px;">Wynik: ${score} &nbsp;|&nbsp; Rekord: ${best}</p>
    <div class="speed-btns">
      <button class="spd-btn ${startSpeed===1?'active':''}" onclick="setStartSpeed(1)">1</button>
      <button class="spd-btn ${startSpeed===2?'active':''}" onclick="setStartSpeed(2)">2</button>
      <button class="spd-btn ${startSpeed===3?'active':''}" onclick="setStartSpeed(3)">3</button>
    </div>
    <input id="nickInput" type="text" maxlength="12" placeholder="Nick" value="${nick}">
  `;
  
  const rankDiv=document.createElement('div');
  rankDiv.id='ranking';
  div.appendChild(rankDiv);
  
  const btnRestart=document.createElement('button');
  btnRestart.className = 'spd-btn';
  btnRestart.style.marginTop = '5px';
  btnRestart.textContent='▶ ZAGRAJ PONOWNIE';
  btnRestart.onclick=()=>{
    overlay.innerHTML = menuHTML;
    setupMainMenuBindings();
    setStartSpeed(startSpeed);
    renderRanking(-1);
  };
  
  div.appendChild(btnRestart);
  overlay.appendChild(div);
  overlay.style.display='flex';
  
  renderRanking(hi, rankDiv);
}

function startGame(){
  init();overlay.style.display='none';running=true;paused=false;
  placeFood();draw();restartLoop();
}

// ── KLAWIATURA ───────────────────────────────────────
const DMAP={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if(e.key==='Escape'&&running){paused=!paused;if(paused)clearInterval(loopId);else restartLoop();return;}
  if(!running||paused)return;
  const d=DMAP[e.key];
  if(d&&!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;
});

// ── GAMEPAD BUTTONS ───────────────────────────────────
function gpDir(d){if(!running||paused)return;if(d&&!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;}
function addGP(id,d){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('touchstart',e=>{e.preventDefault();gpDir(d);},{passive:false});
  el.addEventListener('mousedown',()=>gpDir(d));
}
addGP('gUp',{x:0,y:-1});addGP('gDown',{x:0,y:1});addGP('gLeft',{x:-1,y:0});addGP('gRight',{x:1,y:0});

function togglePause() {
  if(!running)return;paused=!paused;if(paused)clearInterval(loopId);else restartLoop();
}
document.getElementById('gPause').addEventListener('touchstart', (e)=>{e.preventDefault(); togglePause();});
document.getElementById('gPause').addEventListener('click', togglePause);

// ── SWIPE ─────────────────────────────────────────────
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy))gpDir({x:dx>0?1:-1,y:0});
  else gpDir({x:0,y:dy>0?1:-1});
},{passive:true});

setupMainMenuBindings();
renderRanking();
init();draw();
</script>
</body>
</html>
