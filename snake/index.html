<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wąż</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;touch-action:none;overflow:hidden;}
    #ui{display:flex;gap:24px;margin-bottom:8px;color:#00d4ff;font-size:14px;letter-spacing:0.13em;flex-wrap:wrap;justify-content:center;}
    #speedbar{display:flex;gap:8px;align-items:center;margin-bottom:8px;color:#8899aa;font-size:12px;letter-spacing:0.1em;flex-wrap:wrap;justify-content:center;}
    canvas{border:2px solid rgba(0,212,255,0.4);border-radius:4px;box-shadow:0 0 30px rgba(0,212,255,0.15);background:#050a14;display:block;max-width:100%;max-height:60vw;}
    #overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#00d4ff;text-align:center;background:rgba(5,10,20,0.88);border-radius:4px;}
    #overlay h2{font-size:24px;letter-spacing:0.2em;color:#c8a84b;}
    #overlay p{font-size:12px;letter-spacing:0.08em;color:#8899aa;line-height:1.8;}
    .speed-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    .spd-btn{padding:7px 16px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.35);color:#00d4ff;font-family:'Courier New',monospace;font-size:12px;letter-spacing:0.1em;cursor:pointer;border-radius:2px;transition:all 0.2s;}
    .spd-btn:hover,.spd-btn.active{background:rgba(0,212,255,0.2);box-shadow:0 0 10px rgba(0,212,255,0.3);border-color:#00d4ff;}
    .spd-btn.active{color:#fff;}
    #wrap{position:relative;display:inline-block;max-width:100%;}
    /* Dpad mobile */
    #dpad{display:none;margin-top:10px;position:relative;width:120px;height:120px;}
    #dpad button{position:absolute;width:38px;height:38px;background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;font-size:18px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    #dpad .d-up{top:0;left:41px;}
    #dpad .d-down{bottom:0;left:41px;}
    #dpad .d-left{left:0;top:41px;}
    #dpad .d-right{right:0;top:41px;}
    @media(max-width:600px){#dpad{display:block;}}
    /* Ranking */
    #ranking{margin-top:10px;width:100%;max-width:380px;}
    #ranking table{width:100%;border-collapse:collapse;font-size:11px;color:#8899aa;}
    #ranking th{color:#c8a84b;letter-spacing:0.1em;padding:3px 6px;border-bottom:1px solid rgba(0,212,255,0.2);}
    #ranking td{padding:3px 6px;}
    #ranking tr:first-child td{color:#00d4ff;}
  </style>
</head>
<body>
  <div id="ui">
    <span>WYNIK: <b id="score">0</b></span>
    <span>REKORD: <b id="best">0</b></span>
    <span>PRĘDKOŚĆ: <b id="curspeed">1</b></span>
  </div>
  <div id="speedbar">
    POZIOM:
    <button class="spd-btn active" id="s1" onclick="setStartSpeed(1)">1 — WOLNO</button>
    <button class="spd-btn" id="s2" onclick="setStartSpeed(2)">2 — ŚREDNIO</button>
    <button class="spd-btn" id="s3" onclick="setStartSpeed(3)">3 — SZYBKO</button>
  </div>
  <div id="wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>WĄŻ</h2>
      <p>Strzałki / Dpad = ruch &nbsp;|&nbsp; Esc = pauza</p>
      <div class="speed-btns">
        <button class="spd-btn active" id="o1" onclick="setStartSpeed(1)">1 — WOLNO</button>
        <button class="spd-btn" id="o2" onclick="setStartSpeed(2)">2 — ŚREDNIO</button>
        <button class="spd-btn" id="o3" onclick="setStartSpeed(3)">3 — SZYBKO</button>
      </div>
      <button class="spd-btn" style="margin-top:4px" id="startBtn">▶ ZAGRAJ</button>
      <div id="ranking"></div>
    </div>
  </div>
  <div id="dpad">
    <button class="d-up" ontouchstart="dpadPress('ArrowUp')" ontouchend="dpadRelease()">▲</button>
    <button class="d-down" ontouchstart="dpadPress('ArrowDown')" ontouchend="dpadRelease()">▼</button>
    <button class="d-left" ontouchstart="dpadPress('ArrowLeft')" ontouchend="dpadRelease()">◀</button>
    <button class="d-right" ontouchstart="dpadPress('ArrowRight')" ontouchend="dpadRelease()">▶</button>
  </div>

<script>
const COLS=20,ROWS=20,CELL=20;

// ── SKALOWANIE DO OKNA ────────────────────────────────
let scale=1;
function resizeCanvas(){
  const maxW=Math.min(window.innerWidth-16, 500);
  const maxH=Math.min(window.innerHeight-180, 500);
  const size=Math.min(maxW,maxH);
  scale=size/(COLS*CELL);
  canvas.style.width=size+"px";
  canvas.style.height=size+"px";
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),curSpeedEl=document.getElementById('curspeed');

const SPEED_BASE=[null, 291, 200, 127];
const SPEED_STEP=[null,20,14,9];
const SPEED_MIN=[null, 109, 82, 55];

let snake,dir,nextDir,food,score,best=0,loop,running=false,paused=false;
let startSpeed=1;

// ── RANKING ──────────────────────────────────────────────
function getScores(){try{return JSON.parse(localStorage.getItem('snake_scores')||'[]');}catch{return[];}}
function saveScore(nick,pts){
  const s=getScores();
  s.push({nick,pts,date:new Date().toLocaleDateString('pl')});
  s.sort((a,b)=>b.pts-a.pts);
  localStorage.setItem('snake_scores',JSON.stringify(s.slice(0,10)));
}
function renderRanking(){
  const s=getScores();
  if(!s.length){document.getElementById('ranking').innerHTML='';return;}
  document.getElementById('ranking').innerHTML=`<table><tr><th>#</th><th>Nick</th><th>Wynik</th><th>Data</th></tr>${s.slice(0,10).map((r,i)=>`<tr><td>${i+1}</td><td>${r.nick}</td><td>${r.pts}</td><td>${r.date}</td></tr>`).join('')}</table>`;
}

function setStartSpeed(n){
  startSpeed=n;
  [1,2,3].forEach(i=>{
    document.getElementById('s'+i)?.classList.toggle('active',i===n);
    document.getElementById('o'+i)?.classList.toggle('active',i===n);
  });
}

function getInterval(sc){
  const reduced=Math.floor(sc/5)*SPEED_STEP[startSpeed];
  return Math.max(SPEED_MIN[startSpeed],SPEED_BASE[startSpeed]-reduced);
}

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;scoreEl.textContent=0;
  curSpeedEl.textContent=startSpeed;
  placeFood();
}

function placeFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function restartLoop(){clearInterval(loop);loop=setInterval(step,getInterval(score));}

function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;scoreEl.textContent=score;
    if(score>best){best=score;bestEl.textContent=best;}
    if(score%5===0){curSpeedEl.textContent=startSpeed+Math.floor(score/5);restartLoop();return;}
    placeFood();
  } else {snake.pop();}
  draw();
}

function draw(){
  ctx.fillStyle='#050a14';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,212,255,0.04)';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
  ctx.fillStyle='#c8a84b';ctx.shadowColor='#c8a84b';ctx.shadowBlur=10;
  ctx.fillRect(food.x*CELL+2,food.y*CELL+2,CELL-4,CELL-4);ctx.shadowBlur=0;
  snake.forEach((s,i)=>{
    const ratio=1-i/snake.length;
    ctx.fillStyle=i===0?'#00d4ff':`rgba(0,${Math.floor(150*ratio+50)},${Math.floor(200*ratio+55)},${0.4+ratio*0.6})`;
    ctx.shadowColor=i===0?'#00d4ff':'transparent';ctx.shadowBlur=i===0?8:0;
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
  });
  ctx.shadowBlur=0;
}

function gameOver(){
  clearInterval(loop);running=false;
  // zapytaj o nick i zapisz wynik
  const nickInput=`<input id="nickInput" placeholder="Twój nick" maxlength="12" style="margin-top:6px;padding:5px 10px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;font-family:'Courier New',monospace;font-size:13px;letter-spacing:0.1em;border-radius:2px;width:140px;text-align:center">`;
  overlay.innerHTML=`
    <h2>KONIEC</h2>
    <p>Wynik: ${score} &nbsp;|&nbsp; Rekord: ${best}</p>
    ${nickInput}
    <div class="speed-btns">
      <button class="spd-btn ${startSpeed===1?'active':''}" onclick="setStartSpeed(1)">1</button>
      <button class="spd-btn ${startSpeed===2?'active':''}" onclick="setStartSpeed(2)">2</button>
      <button class="spd-btn ${startSpeed===3?'active':''}" onclick="setStartSpeed(3)">3</button>
    </div>
    <button class="spd-btn" onclick="submitScore()">💾 ZAPISZ I ZAGRAJ PONOWNIE</button>
    <div id="ranking"></div>
  `;
  overlay.style.display='flex';
  renderRanking();
}

function submitScore(){
  const nick=(document.getElementById('nickInput')?.value||'???').trim()||'???';
  if(score>0) saveScore(nick,score);
  startGame();
}

function startGame(){
  init();overlay.style.display='none';
  running=true;paused=false;
  placeFood();draw();restartLoop();
}

// Swipe na mobile
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20&&dir.x===0) nextDir={x:1,y:0};
    else if(dx<-20&&dir.x===0) nextDir={x:-1,y:0};
  } else {
    if(dy>20&&dir.y===0) nextDir={x:0,y:1};
    else if(dy<-20&&dir.y===0) nextDir={x:0,y:-1};
  }
},{passive:true});

function dpadPress(key){
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  const d=map[key];
  if(d&&!(d.x===-dir.x&&d.y===-dir.y)) nextDir=d;
}
function dpadRelease(){}

document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(e.key==='Escape'&&running){paused=!paused;if(paused)clearInterval(loop);else restartLoop();return;}
  if(!running||paused) return;
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  const d=map[e.key];
  if(d&&!(d.x===-dir.x&&d.y===-dir.y)) nextDir=d;
});

document.getElementById('startBtn').addEventListener('click',startGame);
renderRanking();
init();draw();
</script>
</body>
</html>
