<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szach Mat - High Contrast</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; font-family: 'Courier New', Courier, monospace;
        }
        .plansza-kontener { position: relative; width: 92vmin; height: 92vmin; }
        .szachownica {
            width: 100%; height: 100%; display: grid;
            grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            border: 2px solid #444;
        }
        .pole {
            display: flex; justify-content: center; align-items: center;
            font-size: 7.5vmin; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Pola: czarne i bardzo ciemny grafit */
        .szachownica div:nth-child(odd) { background-color: #0a0a0a; }
        .szachownica div:nth-child(even) { background-color: #000; }

        /* BIAŁE FIGURY - Złoty Neon (teraz ich nie przegapisz) */
        .biale { 
            color: #fff; 
            filter: drop-shadow(0 0 5px #ffd700) drop-shadow(0 0 15px #b8860b);
            font-weight: bold;
            z-index: 5;
        }

        /* CZARNE FIGURY - Stalowy Błękit (odcinają się od czarnego tła) */
        .czarne { 
            color: #5d8aa8; 
            filter: drop-shadow(0 0 3px #000);
        }

        #czarny-krol { cursor: pointer; transition: 0.2s; }
        #czarny-krol:hover { transform: scale(1.2); color: #fff; }

        .dym-napis {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 14vmin; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2vmin; z-index: 10; pointer-events: none;
            animation: dymienie 4s infinite alternate ease-in-out;
        }
        @keyframes dymienie {
            0% { text-shadow: 0 0 20px #fff; opacity: 0.7; }
            100% { text-shadow: 0 -30px 50px #fff, 0 -50px 80px #ffd700; opacity: 0.2; transform: translate(-50%, -60%) scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="plansza-kontener">
        <div class="dym-napis">SZACH MAT</div>
        <div class="szachownica">
            <div class="pole czarne">♜</div><div class="pole"></div><div class="pole czarne">♝</div><div class="pole czarne">♛</div><div class="pole czarne" id="czarny-krol">♚</div><div class="pole czarne">♝</div><div class="pole"></div><div class="pole czarne">♜</div>

            <div class="pole"></div><div class="pole"></div><div class="pole czarne">♞</div><div class="pole"></div><div class="
