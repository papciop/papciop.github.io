<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szach Mat Cały Ekran - Papcio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Wyłącza paski przewijania */
            background-color: #1a1a1a; /* Ciemne tło wokół planszy */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Kontener dla szachownicy i napisu */
        .plansza-kontener {
            position: relative;
            /* Szachownica jest kwadratem. 90% krótszego boku ekranu. */
            width: 90vmin;
            height: 90vmin;
            border: 5vmin solid #333; /* Ciemna ramka z jednostkami vmin */
            border-radius: 2vmin;
            box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.8);
            box-sizing: content-box; /* Ważne dla poprawnego liczenia borderu */
        }

        /* Stylizacja Szachownicy */
        .szachownica {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
        }

        .pole {
            display: flex;
            justify-content: center;
            align-items: center;
            /* Rozmiar czcionki skaluje się razem z planszą */
            font-size: 6vmin;
        }

        /* Wzór szachownicy: biało-szary */
        .szachownica div:nth-child(-n+8):nth-child(odd),
        .szachownica div:nth-child(n+9):nth-child(-n+16):nth-child(even),
        .szachownica div:nth-child(n+17):nth-child(-n+24):nth-child(odd),
        .szachownica div:nth-child(n+25):nth-child(-n+32):nth-child(even),
        .szachownica div:nth-child(n+33):nth-child(-n+40):nth-child(odd),
        .szachownica div:nth-child(n+41):nth-child(-n+48):nth-child(even),
        .szachownica
