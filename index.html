<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szach Mat - Poprawny Szewski</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; font-family: 'Courier New', Courier, monospace;
        }
        .plansza-kontener { position: relative; width: 90vmin; height: 90vmin; }
        .szachownica {
            width: 100%; height: 100%; display: grid;
            grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            border: 1px solid #333;
        }
        .pole {
            display: flex; justify-content: center; align-items: center;
            font-size: 8vmin; border: 1px solid rgba(255, 255, 255, 0.03);
        }
        /* Ciemna stylistyka pól */
        .szachownica div:nth-child(odd) { background-color: #050505; }
        .szachownica div:nth-child(even) { background-color: #000; }
        
        .biale { 
            color: #fff; filter: drop-shadow(0 0 8px #fff); z-index: 5; 
        }
        .czarne { 
            color: #444; text-shadow: 0 0 5px #000;
        }
        #czarny-krol { cursor: pointer; transition: transform 0.2s; }
        #czarny-krol:hover { transform: scale(1.1); color: #666; }

        .dym-napis {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 14vmin; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2vmin; z-index: 10; pointer-events: none;
            animation: dymienie 4s infinite alternate ease-in-out;
        }
        @keyframes dymienie {
            0% { text-shadow: 0 0 20px #fff; opacity: 0.8; }
            100% { text-shadow: 0 -20px 40px #fff; opacity: 0.2; transform: translate(-50%, -65%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="plansza-kontener">
        <div class="dym-napis">SZACH MAT</div>
        <div class="szachownica">
            <div class="pole czarne">♜</div><div class="pole"></div><div class="pole czarne">♝</div><div class="pole czarne">♛</div><div class="pole czarne" id="czarny-krol">♚</div><div class="pole czarne">♝</div><div class="pole"></div><div class="pole czarne">♜</div>
            
            <div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole"></div><div class="pole biale">♕</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div>
            
            <div class="pole"></div><div class="pole"></div><div class="pole czarne">♞</div><div class="pole"></div><div class="pole"></div><div class="pole czarne">♞</div><div class="pole"></div><div class="pole"></div>
            
            <div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole czarne">♟</div><div class="pole"></div><div class="pole"></div><div class="pole"></div>
