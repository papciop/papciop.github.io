<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szach Mat dla Papcia</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Kontener dla szachownicy i napisu */
        .plansza-kontener {
            position: relative;
        }

        /* Stylizacja Szachownicy */
        .szachownica {
            width: 400px;
            height: 400px;
            border: 5px solid #34495e;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .pole {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            /* Używamy symboli Unicode dla figur szachowych */
        }

        /* Biało-szara szachownica */
        .szachownica .pole:nth-child(even) { background-color: #bdc3c7; } /* Jasny szary */
        .szachownica .pole:nth-child(odd) { background-color: #ecf0f1; }  /* Biały */

        /* Naprawienie wzoru szachownicy dla rzędów */
        .szachownica div:nth-child(-n+8):nth-child(odd),
        .szachownica div:nth-child(n+9):nth-child(-n+16):nth-child(even),
        .szachownica div:nth-child(n+17):nth-child(-n+24):nth-child(odd),
        .szachownica div:nth-child(n+25):nth-child(-n+32):nth-child(even),
        .szachownica div:nth-child(n+33):nth-child(-n+40):nth-child(odd),
        .szachownica div:nth-child(n+41):nth-child(-n+48):nth-child(even),
        .szachownica div:nth-child(n+49):nth-child(-n+56):nth-child(odd),
        .szachownica div:nth-child(n+57):nth-child(even) {
            background-color: #ecf0f1;
        }
        
        .szachownica div:nth-child(-n+8):nth-child(even),
        .szachownica div:nth-child(n+9):nth-child(-n+16):nth-child(odd),
        .szachownica div:nth-child(n+17):nth-child(-n+24):nth-child(even),
        .szachownica div:nth-child(n+25):nth-child(-n+32):nth-child(odd),
        .szachownica div:nth-child(n+33):nth-child(-n+40):nth-child(even),
        .szachownica div:nth-child(n+41):nth-child(-n+48):nth-child(odd),
        .szachownica div:nth-child(n+49):nth-child(-n+56):nth-child(even),
        .szachownica div:nth-child(n+57):nth-child(odd) {
            background-color: #bdc3c7;
        }

        /* Kolory figur */
        .biale { color: #fff; text-shadow: 0 0 2px #000; }
        .czarne { color: #000; }

        /* Stylizacja dymiącego napisu */
        .dym-napis {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-size: 60px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            white-space: nowrap;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            animation: dymienie 2s infinite alternate;
            z-index: 10;
        }

        /* Efekt dymu w CSS */
        @keyframes dymienie {
            0% {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff, 0 0 40px #fff;
                opacity: 1;
            }
            100% {
                text-shadow: 0 0 5px #fff, 2px -2px 10px #bbb, -2px -4px 15px #999, 2px -6px 20px #777;
                opacity: 0.8;
                transform: translate(-50%, -52%) scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div class="plansza-kontener">
        <div class="dym-napis">Szach Mat</div>

        <div class="szachownica">
            <div class="pole czarne">♜</div><div class="pole czarne">♞</div><div class="pole czarne">♝</div><div class="pole czarne"></div><div class="pole czarne">♚</div><div class="pole czarne">♝</div><div class="pole czarne">♞</div><div class="pole czarne">♜</div>
            <div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole biale">♕</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div><div class="pole czarne">♟</div>
            <div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div>
            <div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div>
            <div class="pole"></div><div class="pole"></div><div class="pole biale">♗</div><div class="pole"></div><div class="pole biale">♙</div><div class="pole"></div><div class="pole"></div><div class="pole"></div>
            <div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div><div class="pole"></div>
            <div class="pole biale">♙</div><div class="pole biale">♙</div><div class="pole biale">♙</div><div class="pole biale">♙</div><div class="pole"></div><div class="pole biale">♙</div><div class="pole biale">♙</div><div class="pole biale">♙</div>
            <div class="pole biale">♖</div><div class="pole biale">♘</div><div class="pole biale"></div><div class="pole biale"></div><div class="pole biale">♔</div><div class="pole biale"></div><div class="pole biale">♘</div><div class="pole biale">♖</div>
        </div>
    </div>

</body>
</html>
