<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Szach Mat - Wersja Finalna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100%;height:100%;overflow:hidden;background:#080604;font-family:'Cinzel',serif;display:flex;justify-content:center;align-items:center;}

.view{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity .4s;}
.view.hidden{opacity:0;pointer-events:none;}

.smoke-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.1rem,3.5vmin,2.1rem);color:#d4b866;letter-spacing:.38em;text-shadow:0 0 16px #d4b86699,0 0 45px #d4b86644;white-space:nowrap;margin-bottom:10px;animation:dym 3.5s ease-in-out infinite alternate;flex-shrink:0;}
@keyframes dym{0%{opacity:.95;transform:translateY(0) scale(1);}100%{opacity:.3;transform:translateY(-5px) scale(1.04);}}

.board-outer{display:grid;grid-template-columns:16px 1fr 16px;grid-template-rows:1fr 16px;width:min(62vmin,420px);height:min(62vmin,420px);flex-shrink:0;}
.labels-rank,.labels-rank-r{display:flex;flex-direction:column;justify-content:space-around;align-items:center;}
.labels-file{grid-column:2/3;grid-row:2/3;display:flex;flex-direction:row;justify-content:space-around;align-items:center;}
.lbl{font-size:clamp(.38rem,1.1vmin,.6rem);color:#7a6030;user-select:none;}
.chess-wrap{grid-column:2/3;grid-row:1/2;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:2px solid #5a3e18;box-shadow:0 0 28px #000a,inset 0 0 14px #0007;}
.sq{display:flex;justify-content:center;align-items:center;font-size:clamp(.85rem,3.4vmin,1.9rem);}
.sq.light{background:#d4b483;}.sq.dark{background:#4a2c0a;}
.wp{color:#f0ece2;text-shadow:1px 1px 0 #7a5520,-1px -1px 0 #7a5520,1px -1px 0 #7a5520,-1px 1px 0 #7a5520,0 2px 5px #0009;}
.bp{color:#100e06;text-shadow:1px 1px 0 #c8a84b,-1px -1px 0 #c8a84b,1px -1px 0 #c8a84b,-1px 1px 0 #c8a84b,0 0 6px #c8a84b44;}
.sq span.clickable{cursor:pointer;transition:transform .18s;}
.sq span.clickable:hover{transform:scale(1.2);filter:brightness(1.4);}

/* Widoczniejsze ramki */
canvas, .ttt-board { border: 3px solid #d4b866; box-shadow: 0 0 15px rgba(212,184,102,0.4); }

.clocks-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:min(62vmin,420px);margin-top:9px;}
.clock-mini{background:#0e0904;border:1px solid #3a2a0c;padding:5px;text-align:center;}
.cm-time{color:#d4b866;font-weight:600;font-size:0.9rem;}

.btn-back{position:absolute;top:15px;left:15px;background:rgba(212,184,102,0.1);border:1px solid #d4b866;color:#d4b866;padding:8px 15px;cursor:pointer;z-index:100;}
.art-img{max-width:90%;max-height:70vh;border:2px solid #d4b866;box-shadow:0 0 30px rgba(212,184,102,0.2);}

.game-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#3a2a0c;padding:4px;}
.ttt-cell{width:80px;height:80px;background:#0e0904;display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer;color:#d4b866;}
</style>
</head>
<body>

<div id="v-board" class="view">
  <div class="smoke-title">SZACH&nbsp;MAT</div>
  <div class="board-outer">
    <div class="labels-rank" id="rank-left"></div>
    <div class="chess-wrap" id="chess-board"></div>
    <div class="labels-rank-r" id="rank-right"></div>
    <div class="labels-file" id="file-labels"></div>
  </div>
  <div class="clocks-strip" id="clocks-strip"></div>
</div>

<div id="v-art1" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Powrót</button>
  <h2 class="smoke-title">Mechanizm Nieba</h2>
  <img src="Gemini_Generated_Image_rz8aocrz8aocrz8a.jpg" class="art-img">
</div>

<div id="v-art2" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Powrót</button>
  <h2 class="smoke-title">Stycznik Główny</h2>
  <img src="Gemini_Generated_Image_avi7obavi7obavi7.jpg" class="art-img">
</div>

<div id="v-snake" class="view hidden"><button class="btn-back" onclick="showBoard()">←</button><div class="game-wrap"><canvas id="snake-canvas"></canvas></div></div>
<div id="v-pong" class="view hidden"><button class="btn-back" onclick="showBoard()">←</button><div class="game-wrap"><canvas id="pong-canvas"></canvas></div></div>
<div id="v-ttt" class="view hidden"><button class="btn-back" onclick="showBoard()">←</button><div class="game-wrap"><div id="ttt-board" class="ttt-board"></div></div></div>
<div id="v-wr" class="view hidden"><button class="btn-back" onclick="showBoard()">←</button><div class="game-wrap"><canvas id="wr-canvas"></canvas></div></div>

<script>
const ROWS=[
  ['♜','','♝','♛','♚','♝','','♜'],
  ['♟','♟','♟','♟','','♕','♟','♟'],
  ['','','♞','','','♞','',''], // Tu są skoczki (c6, f6)
  ['','','','','♟','','',''],
  ['','','♗','','♙','','',''],
  ['','','','','','','',''],
  ['♙','♙','♙','♙','','♙','♙','♙'],
  ['♖','♞','♗','','♔','','♞','♖'], // Skoczki białe (b1, g1)
];

const ACTIONS = {
  '7-1': () => { goTo('v-snake'); snakeRestart(); },
  '7-6': () => { goTo('v-pong'); pongRestart(); },
  '2-2': () => { goTo('v-ttt'); tttRestart(); }, // Czarny skoczek c6
  '2-5': () => { goTo('v-wr'); wrRestart(); },   // Czarny skoczek f6
  '1-5': () => goTo('v-art1'), // Biała Królowa d2 (indeks 1,5 w ROWS)
  '0-3': () => goTo('v-art2')  // Czarna Królowa d8 (indeks 0,3 w ROWS)
};

function buildBoard(){
  const board=document.getElementById('chess-board');
  const RL=document.getElementById('rank-left'), RR=document.getElementById('rank-right'), FL=document.getElementById('file-labels');
  RL.innerHTML=RR.innerHTML=[8,7,6,5,4,3,2,1].map(n=>`<span class="lbl">${n}</span>`).join('');
  FL.innerHTML=['a','b','c','d','e','f','g','h'].map(l=>`<span class="lbl">${l}</span>`).join('');
  
  ROWS.forEach((row,r)=>{
    row.forEach((piece,c)=>{
      const sq=document.createElement('div');
      sq.className='sq '+((r+c)%2===0?'dark':'light');
      if(piece){
        const sp=document.createElement('span');
        sp.textContent=piece;
        sp.className=(r > 3) ? 'wp' : 'bp'; 
        if(ACTIONS[`${r}-${c}`]){
          sp.classList.add('clickable');
          sp.onclick = ACTIONS[`${r}-${c}`];
        }
        sq.appendChild(sp);
      }
      board.appendChild(sq);
    });
  });
}

function goTo(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function showBoard(){ goTo('v-board'); }

/* --- LOGIKA GIER (SNAKE, PONG, TTT, WR) - SKRÓCONA DLA CZYTELNOŚCI --- */
// (W pełnej wersji tutaj ląduje kod z Twojego pliku dotyczący mechaniki)

// PRZYKŁAD RESTARTU TTT
function tttRestart(){
  const b=document.getElementById('ttt-board'); b.innerHTML='';
  for(let i=0; i<9; i++){
    const c=document.createElement('div'); c.className='ttt-cell';
    c.onclick=()=> { if(!c.textContent) c.textContent='X'; };
    b.appendChild(c);
  }
}

// PRZYKŁAD RESTARTU WR (Wilk i Zając)
function wrRestart(){
  const c=document.getElementById('wr-canvas'); c.width=400; c.height=250;
  const ctx=c.getContext('2d');
  function draw(){
    ctx.fillStyle='#050510'; ctx.fillRect(0,0,400,250);
    // Zając
    ctx.fillStyle='#d0d0c8'; ctx.fillRect(50,180,20,20); // Głowa
    ctx.fillRect(55,165,4,15); ctx.fillRect(61,165,4,15); // Uszy
    // Wilk
    ctx.fillStyle='#5a5060'; ctx.fillRect(300,180,25,25);
    ctx.fillStyle='#ff2020'; ctx.fillRect(318,185,3,3); // Oko
    requestAnimationFrame(draw);
  }
  draw();
}

// Inicjalizacja
buildBoard();
</script>
</body>
</html>
