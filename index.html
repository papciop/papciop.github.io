<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szach Mat - Ultra Dark Edition</title>
    <style>
        /* 1. Ustawienia bazy - Czarna strona */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 2. Kontener szachownicy - Skalowanie do ekranu */
        .plansza-kontener {
            position: relative;
            width: 92vmin;
            height: 92vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. Siatka szachownicy */
        .szachownica {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 2px solid #222;
        }

        .pole {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8vmin;
            transition: all 0.3s ease;
        }

        /* 4. Kolory pól - Bardzo ciemne */
        /* Pola "Jasne" (Ciemnoszary) */
        .szachownica div:nth-child(-n+8):nth-child(odd),
        .szachownica div:nth-child(n+9):nth-child(-n+16):nth-child(even),
        .szachownica div:nth-child(n+17):nth-child(-n+24):nth-child(odd),
        .szachownica div:nth-child(n+25):nth-child(-n+32):nth-child(even),
        .szachownica div:nth-child(n+33):nth-child(-n+40):nth-child(odd),
        .szachownica div:nth-child(n+41):nth-child(-n+48):nth-child(even),
        .szachownica div:nth-child(n+49):nth-child(-n+56):nth-child(odd),
        .szachownica div:nth-child(n+57):nth-child(even) {
            background-color: #151515;
        }
        
        /* Pola "Ciemne" (Głęboka czerń) */
        .szachownica div:nth-child(-n+8):nth-child(even),
        .szachownica div:nth-child(n+9):nth-child(-n+16):nth-child(odd),
        .szachownica div:nth-child(n+17):nth-child(-n+24):nth-child(even),
        .szachownica div:nth-child(n+25):nth-child(-n+32):nth-child(odd),
        .szachownica div:nth-child(n+33):nth-child(-n
