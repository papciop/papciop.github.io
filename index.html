<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Szach Mat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100%;height:100%;overflow:hidden;background:#080604;font-family:'Cinzel',serif;display:flex;justify-content:center;align-items:center;}

.view{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity .4s;}
.view.hidden{opacity:0;pointer-events:none;}

.smoke-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.1rem,3.5vmin,2.1rem);color:#d4b866;letter-spacing:.38em;text-shadow:0 0 16px #d4b86699,0 0 45px #d4b86644;white-space:nowrap;margin-bottom:10px;animation:dym 3.5s ease-in-out infinite alternate;flex-shrink:0;}
@keyframes dym{0%{opacity:.95;transform:translateY(0) scale(1);}100%{opacity:.3;transform:translateY(-5px) scale(1.04);}}

.board-outer{display:grid;grid-template-columns:16px 1fr 16px;grid-template-rows:1fr 16px;width:min(62vmin,420px);height:min(62vmin,420px);flex-shrink:0;}
.labels-rank,.labels-rank-r{display:flex;flex-direction:column;justify-content:space-around;align-items:center;}
.labels-file{grid-column:2/3;grid-row:2/3;display:flex;flex-direction:row;justify-content:space-around;align-items:center;}
.lbl{font-size:clamp(.38rem,1.1vmin,.6rem);color:#7a6030;user-select:none;}
.chess-wrap{grid-column:2/3;grid-row:1/2;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:2px solid #5a3e18;box-shadow:0 0 28px #000a,inset 0 0 14px #0007;}
.sq{display:flex;justify-content:center;align-items:center;font-size:clamp(.85rem,3.4vmin,1.9rem);}
.sq.light{background:#d4b483;}.sq.dark{background:#4a2c0a;}
.wp{color:#f0ece2;text-shadow:1px 1px 0 #7a5520,-1px -1px 0 #7a5520,1px -1px 0 #7a5520,-1px 1px 0 #7a5520,0 2px 5px #0009;}
.bp{color:#100e06;text-shadow:1px 1px 0 #c8a84b,-1px -1px 0 #c8a84b,1px -1px 0 #c8a84b,-1px 1px 0 #c8a84b,0 0 6px #c8a84b44;}
.sq span{display:block;line-height:1;transition:transform .18s,filter .18s;}
.sq span.clickable{cursor:pointer;}
.sq span.clickable:hover{transform:scale(1.25);filter:brightness(1.6) drop-shadow(0 0 6px #d4b86688);}

.clocks-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:min(62vmin,420px);margin-top:9px;flex-shrink:0;}
.clock-mini{background:#0e0904;border:1px solid #3a2a0c;border-radius:2px;padding:5px 4px;text-align:center;}
.cm-flag{font-size:clamp(.55rem,1.5vmin,.8rem);line-height:1;}
.cm-city{font-size:clamp(.34rem,1vmin,.52rem);color:#7a6030;letter-spacing:.07em;text-transform:uppercase;margin:2px 0;}
.cm-time{font-size:clamp(.65rem,2vmin,.95rem);font-weight:600;color:#d4b866;font-variant-numeric:tabular-nums;}
.cm-date{font-size:clamp(.3rem,.9vmin,.46rem);color:#4a3818;margin-top:1px;}

.btn-back{position:absolute;top:14px;left:14px;background:rgba(212,184,102,.1);border:1px solid rgba(212,184,102,.4);color:#d4b866;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.14em;padding:7px 15px;cursor:pointer;border-radius:2px;z-index:20;transition:background .2s;}
.btn-back:hover{background:rgba(212,184,102,.25);}

.subpage{width:100%;height:100%;padding:54px 16px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.sub-title{font-family:'Cinzel Decorative',serif;font-size:clamp(.85rem,2.3vw,1.05rem);color:#d4b866;letter-spacing:.22em;text-shadow:0 0 12px #d4b86655;text-align:center;}

.clocks-grid-full{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;width:100%;max-width:480px;}
.clock-card{background:#100b04;border:1px solid #5a3e18;border-radius:3px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.clock-city{font-size:.66rem;letter-spacing:.17em;color:#8a7040;text-transform:uppercase;}
.clock-time{font-size:clamp(1.3rem,3.8vw,1.9rem);font-weight:600;color:#d4b866;letter-spacing:.06em;font-variant-numeric:tabular-nums;}
.clock-date{font-size:.61rem;color:#5a4820;letter-spacing:.09em;}

.weather-card{background:#100b04;border:1px solid #5a3e18;border-radius:3px;padding:24px 30px;max-width:360px;width:100%;text-align:center;}
.w-place{font-size:.66rem;letter-spacing:.18em;color:#7a6030;margin-bottom:10px;}
.w-icon{font-size:2.8rem;margin-bottom:4px;line-height:1;}
.w-temp{font-size:clamp(2.2rem,6.5vw,3rem);font-weight:600;color:#d4b866;}
.w-desc{font-size:.8rem;color:#9a8040;margin:7px 0 4px;letter-spacing:.11em;}
.w-details{display:flex;gap:20px;justify-content:center;margin-top:12px;}
.w-detail{font-size:.68rem;color:#5a4820;letter-spacing:.07em;text-align:center;}
.w-detail strong{display:block;color:#9a8254;font-size:.88rem;font-weight:600;margin-bottom:2px;}
.loading-txt{color:#5a4020;font-size:.76rem;letter-spacing:.14em;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:30;display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#110d05;border:1px solid rgba(212,184,102,.5);border-radius:3px;padding:26px 30px;min-width:250px;text-align:center;}
.modal-box p{color:#d4b866;font-size:.8rem;letter-spacing:.13em;margin-bottom:15px;}
.modal-box input{background:#080604;border:1px solid #5a3e18;color:#d4b866;font-family:'Cinzel',serif;font-size:.88rem;padding:8px 12px;width:100%;border-radius:2px;text-align:center;outline:none;transition:border-color .2s;}
.modal-box input:focus{border-color:#d4b86688;}
.modal-box button{margin-top:12px;background:rgba(212,184,102,.12);border:1px solid rgba(212,184,102,.45);color:#d4b866;font-family:'Cinzel',serif;padding:8px 20px;cursor:pointer;border-radius:2px;font-size:.76rem;letter-spacing:.13em;transition:background .2s;}
.modal-box button:hover{background:rgba(212,184,102,.28);}
.err-msg{color:#b04030!important;font-size:.7rem!important;margin-top:8px!important;margin-bottom:0!important;}

/* GAME SHARED */
.game-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 12px 12px;gap:8px;}
.game-status{font-size:.7rem;letter-spacing:.13em;color:#9a8040;min-height:1.3em;text-align:center;}
.game-btn{background:rgba(212,184,102,.1);border:1px solid rgba(212,184,102,.4);color:#d4b866;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;padding:6px 18px;cursor:pointer;border-radius:2px;transition:background .2s;}
.game-btn:hover{background:rgba(212,184,102,.25);}
canvas{display:block;image-rendering:pixelated;}

/* TTT */
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#3a2a0c;padding:4px;border:2px solid #5a3e18;}
.ttt-cell{width:clamp(60px,14vmin,100px);height:clamp(60px,14vmin,100px);background:#0e0904;display:flex;align-items:center;justify-content:center;font-size:clamp(1.6rem,6vmin,3rem);cursor:pointer;transition:background .15s;user-select:none;}
.ttt-cell:hover{background:#1a1006;}
.ttt-cell.x{color:#d4b866;}
.ttt-cell.o{color:#6ab0d4;}
</style>
</head>
<body>

<!-- SZACHOWNICA -->
<div id="v-board" class="view">
  <div class="smoke-title">SZACH&nbsp;MAT</div>
  <div class="board-outer">
    <div class="labels-rank" id="rank-left"></div>
    <div class="chess-wrap" id="chess-board"></div>
    <div class="labels-rank-r" id="rank-right"></div>
    <div class="labels-file" id="file-labels"></div>
  </div>
  <div class="clocks-strip" id="clocks-strip"></div>
</div>

<!-- ZEGARY -->
<div id="v-clocks" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Szachownica</button>
  <div class="subpage">
    <div class="sub-title">Czas Światowy</div>
    <div class="clocks-grid-full" id="clocks-grid"></div>
  </div>
</div>

<!-- POGODA -->
<div id="v-weather" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Szachownica</button>
  <div class="subpage">
    <div class="sub-title">Pogoda — Nielepice</div>
    <div class="weather-card" id="weather-card"><p class="loading-txt">Pobieranie danych…</p></div>
  </div>
</div>

<!-- GRA 1: WĄŻ -->
<div id="v-snake" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Szachownica</button>
  <div class="game-wrap">
    <div class="sub-title">🐍 Wąż</div>
    <div class="game-status" id="snake-status">Strzałki / WSAD • Spacja = pauza</div>
    <canvas id="snake-canvas"></canvas>
    <button class="game-btn" onclick="snakeRestart()">Nowa gra</button>
  </div>
</div>

<!-- GRA 2: PONG -->
<div id="v-pong" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Szachownica</button>
  <div class="game-wrap">
    <div class="sub-title">🏓 Ping Pong</div>
    <div class="game-status" id="pong-status">W/S = lewy &nbsp;|&nbsp; ↑/↓ = prawy &nbsp;|&nbsp; do 7 pkt</div>
    <canvas id="pong-canvas"></canvas>
    <button class="game-btn" onclick="pongRestart()">Nowa gra</button>
  </div>
</div>

<!-- GRA 3: KÓŁKO I KRZYŻYK -->
<div id="v-ttt" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Szachownica</button>
  <div class="game-wrap">
    <div class="sub-title">✕ Kółko i Krzyżyk ○</div>
    <div class="game-status" id="ttt-status">Ruch gracza X</div>
    <div class="ttt-board" id="ttt-board"></div>
    <button class="game-btn" onclick="tttRestart()">Nowa gra</button>
  </div>
</div>

<!-- GRA 4: WILK I ZAJĄC retro platformer -->
<div id="v-wr" class="view hidden">
  <button class="btn-back" onclick="showBoard()">← Szachownica</button>
  <div class="game-wrap">
    <div class="sub-title">🐺 Wilk i Zając 🐇</div>
    <div class="game-status" id="wr-status">← → skoki • Zbierz marchewki! Uciekaj przed wilkiem!</div>
    <canvas id="wr-canvas"></canvas>
    <button class="game-btn" onclick="wrRestart()">Nowa gra</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <p>Podaj tajne hasło</p>
    <input type="password" id="pwd-input" placeholder="••••••">
    <p class="err-msg hidden" id="err-msg">Błędne hasło</p>
    <button onclick="checkPwd()">Potwierdź</button>
  </div>
</div>

<script>
/* ═══════════════════════ CHESS ═══════════════════════ */
const ROWS=[
  ['♜','','♝','♛','♚','♝','','♜'],
  ['♟','♟','♟','♟','','♕','♟','♟'],
  ['','','♞','','','♞','',''],
  ['','','','','♟','','',''],
  ['','','♗','','♙','','',''],
  ['','','','','','','',''],
  ['♙','♙','♙','♙','','♙','♙','♙'],
  ['♖','♘','♗','','♔','','♘','♖'],
];
const WHITE_P=new Set(['♕','♗','♙','♖','♘','♔']);
const FILES=['a','b','c','d','e','f','g','h'];
const RANKS=['8','7','6','5','4','3','2','1'];
const KNIGHT_ACTIONS={'7-1':()=>goTo('v-snake'),'7-6':()=>goTo('v-pong'),'0-2':()=>goTo('v-ttt'),'0-5':()=>goTo('v-wr')};

function buildBoard(){
  document.getElementById('rank-left').innerHTML=RANKS.map(r=>`<span class="lbl">${r}</span>`).join('');
  document.getElementById('rank-right').innerHTML=RANKS.map(r=>`<span class="lbl">${r}</span>`).join('');
  document.getElementById('file-labels').innerHTML=FILES.map(f=>`<span class="lbl">${f}</span>`).join('');
  const board=document.getElementById('chess-board');board.innerHTML='';
  ROWS.forEach((row,r)=>{
    row.forEach((piece,c)=>{
      const sq=document.createElement('div');
      sq.className='sq '+((r+c)%2===0?'dark':'light');
      if(piece){
        const sp=document.createElement('span');
        sp.textContent=piece;sp.className=WHITE_P.has(piece)?'wp':'bp';
        if(r===0&&c===4){sp.classList.add('clickable');sp.onclick=openModal;}
        if(r===7&&c===4){sp.classList.add('clickable');sp.onclick=showWeather;}
        const key=`${r}-${c}`;
        if(KNIGHT_ACTIONS[key]){
          sp.classList.add('clickable');
          sp.onclick=()=>{KNIGHT_ACTIONS[key]();initGame(key);};
        }
        sq.appendChild(sp);
      }
      board.appendChild(sq);
    });
  });
}
function initGame(k){if(k==='7-1')snakeRestart();if(k==='7-6')pongRestart();if(k==='0-2')tttRestart();if(k==='0-5')wrRestart();}

function goTo(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('hidden',v.id!==id));}
function showBoard(){goTo('v-board');}
function showWeather(){goTo('v-weather');loadWeather();}
function showClocks(){goTo('v-clocks');renderFullClocks();}

/* ═══════════════════════ CLOCKS ═══════════════════════ */
const CITIES=[{name:'Warszawa',tz:'Europe/Warsaw',flag:'🇵🇱'},{name:'Londyn',tz:'Europe/London',flag:'🇬🇧'},{name:'Nowy Jork',tz:'America/New_York',flag:'🇺🇸'},{name:'Tokio',tz:'Asia/Tokyo',flag:'🇯🇵'}];
function fmtTime(tz){return new Intl.DateTimeFormat('pl-PL',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());}
function fmtDate(tz,s){return new Intl.DateTimeFormat('pl-PL',s?{timeZone:tz,weekday:'short',day:'numeric',month:'short'}:{timeZone:tz,weekday:'long',day:'numeric',month:'long'}).format(new Date());}
function renderStrip(){document.getElementById('clocks-strip').innerHTML=CITIES.map(c=>`<div class="clock-mini"><div class="cm-flag">${c.flag}</div><div class="cm-city">${c.name}</div><div class="cm-time">${fmtTime(c.tz)}</div><div class="cm-date">${fmtDate(c.tz,true)}</div></div>`).join('');}
function renderFullClocks(){document.getElementById('clocks-grid').innerHTML=CITIES.map(c=>`<div class="clock-card"><div class="clock-city">${c.flag} ${c.name}</div><div class="clock-time">${fmtTime(c.tz)}</div><div class="clock-date">${fmtDate(c.tz,false)}</div></div>`).join('');}
setInterval(()=>{renderStrip();if(!document.getElementById('v-clocks').classList.contains('hidden'))renderFullClocks();},1000);

/* ═══════════════════════ MODAL ═══════════════════════ */
function openModal(){document.getElementById('modal').classList.remove('hidden');document.getElementById('pwd-input').value='';document.getElementById('err-msg').classList.add('hidden');setTimeout(()=>document.getElementById('pwd-input').focus(),60);}
document.getElementById('pwd-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPwd();if(e.key==='Escape')document.getElementById('modal').classList.add('hidden');});
function checkPwd(){if(document.getElementById('pwd-input').value==='papcio'){document.getElementById('modal').classList.add('hidden');showClocks();}else{document.getElementById('err-msg').classList.remove('hidden');document.getElementById('pwd-input').value='';document.getElementById('pwd-input').focus();}}

/* ═══════════════════════ WEATHER ═══════════════════════ */
const WX_DESC={0:'Bezchmurnie',1:'Głównie słonecznie',2:'Częściowo pochmurno',3:'Pochmurno',45:'Mgła',48:'Oszroniona mgła',51:'Lekka mżawka',53:'Mżawka',55:'Gęsta mżawka',61:'Lekki deszcz',63:'Deszcz',65:'Silny deszcz',71:'Lekki śnieg',73:'Śnieg',75:'Intensywny śnieg',80:'Przelotny deszcz',81:'Deszcze przelotne',82:'Intensywne opady',95:'Burza',96:'Burza z gradem',99:'Ciężka burza'};
const WX_ICON={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
async function loadWeather(){const card=document.getElementById('weather-card');card.innerHTML='<p class="loading-txt">Pobieranie danych…</p>';try{const d=await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.138&longitude=19.809&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m&timezone=Europe%2FWarsaw').then(r=>r.json());const cur=d.current,code=cur.weathercode;card.innerHTML=`<div class="w-place">📍 Nielepice, Małopolska</div><div class="w-icon">${WX_ICON[code]||'🌡️'}</div><div class="w-temp">${Math.round(cur.temperature_2m)}°C</div><div class="w-desc">${WX_DESC[code]||'Brak opisu'}</div><div class="w-details"><div class="w-detail"><strong>${Math.round(cur.apparent_temperature)}°C</strong>Odczuwalna</div><div class="w-detail"><strong>${Math.round(cur.windspeed_10m)} km/h</strong>Wiatr</div><div class="w-detail"><strong>${cur.relativehumidity_2m}%</strong>Wilgotność</div></div>`;}catch{card.innerHTML='<p style="color:#9a4030;font-size:.8rem;">Błąd połączenia z API</p>';}}

/* ═══════════════════════ SNAKE ═══════════════════════ */
(function(){
  const CELL=20,COLS=18,ROWSN=16;
  let snake,dir,nextDir,food,score,alive,paused,animId,last;
  function snakeRestart(){
    const c=document.getElementById('snake-canvas');c.width=CELL*COLS;c.height=CELL*ROWSN;
    snake=[{x:9,y:8},{x:8,y:8},{x:7,y:8}];dir={x:1,y:0};nextDir={x:1,y:0};
    score=0;alive=true;paused=false;last=0;placeFood();
    document.getElementById('snake-status').textContent='Wynik: 0';
    cancelAnimationFrame(animId);loop();
  }
  function placeFood(){do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWSN)};}while(snake.some(s=>s.x===food.x&&s.y===food.y));}
  function loop(ts=0){animId=requestAnimationFrame(loop);if(paused||!alive)return;if(ts-last<130)return;last=ts;
    dir=nextDir;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWSN||snake.some(s=>s.x===h.x&&s.y===h.y)){alive=false;document.getElementById('snake-status').textContent=`Koniec! Wynik: ${score}`;draw();return;}
    snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;document.getElementById('snake-status').textContent=`Wynik: ${score}`;placeFood();}else snake.pop();draw();}
  function draw(){const c=document.getElementById('snake-canvas'),ctx=c.getContext('2d');
    ctx.fillStyle='#0a0702';ctx.fillRect(0,0,c.width,c.height);
    ctx.strokeStyle='#141008';ctx.lineWidth=.5;
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,c.height);ctx.stroke();}
    for(let y=0;y<=ROWSN;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(c.width,y*CELL);ctx.stroke();}
    ctx.fillStyle='#c03020';ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
    snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#d4b866':i%2===0?'#8a7030':'#6a5020';ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);});
    if(!alive||paused){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#d4b866';ctx.font=`bold ${CELL}px Cinzel,serif`;ctx.textAlign='center';ctx.fillText(alive?'PAUZA':'KONIEC',c.width/2,c.height/2+6);}
  }
  const KM={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  document.addEventListener('keydown',e=>{if(document.getElementById('v-snake').classList.contains('hidden'))return;if(e.key===' '){paused=!paused;return;}const nd=KM[e.key];if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y)){nextDir=nd;e.preventDefault();}});
  window.snakeRestart=snakeRestart;
})();

/* ═══════════════════════ PONG ═══════════════════════ */
(function(){
  let ball,pl,pr,sc,animId,running,keys={};
  const PW=10,PH=60,PS=5,BS=4;
  function pongRestart(){
    const c=document.getElementById('pong-canvas');c.width=500;c.height=300;
    ball={x:250,y:150,vx:BS*(Math.random()>.5?1:-1),vy:BS*(Math.random()>.5?1:-1)};
    pl={y:120};pr={y:120};sc={l:0,r:0};running=true;keys={};
    document.getElementById('pong-status').textContent='W/S = lewy  |  ↑/↓ = prawy  |  do 7 pkt';
    cancelAnimationFrame(animId);pongLoop();
  }
  document.addEventListener('keydown',e=>{if(!document.getElementById('v-pong').classList.contains('hidden'))keys[e.key]=true;});
  document.addEventListener('keyup',e=>{keys[e.key]=false;});
  function pongLoop(){animId=requestAnimationFrame(pongLoop);if(!running)return;
    const c=document.getElementById('pong-canvas'),W=c.width,H=c.height;
    if(keys['w']&&pl.y>0)pl.y-=PS;if(keys['s']&&pl.y<H-PH)pl.y+=PS;
    if(keys['ArrowUp']&&pr.y>0)pr.y-=PS;if(keys['ArrowDown']&&pr.y<H-PH)pr.y+=PS;
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.y<=4||ball.y>=H-4)ball.vy*=-1;
    if(ball.x<=PW+10&&ball.y>=pl.y&&ball.y<=pl.y+PH){ball.vx=Math.abs(ball.vx)*1.04;ball.vy+=((ball.y-(pl.y+PH/2))/(PH/2))*2;}
    if(ball.x>=W-PW-10&&ball.y>=pr.y&&ball.y<=pr.y+PH){ball.vx=-Math.abs(ball.vx)*1.04;ball.vy+=((ball.y-(pr.y+PH/2))/(PH/2))*2;}
    const spd=Math.sqrt(ball.vx**2+ball.vy**2);if(spd>14){ball.vx=ball.vx/spd*14;ball.vy=ball.vy/spd*14;}
    if(ball.x<0){sc.r++;reset(-1);}if(ball.x>W){sc.l++;reset(1);}
    if(sc.l>=7||sc.r>=7){running=false;document.getElementById('pong-status').textContent=(sc.l>=7?'Lewy':'Prawy')+' gracz wygrywa! 🏆';}
    draw(c,W,H);}
  function reset(d){const c=document.getElementById('pong-canvas');ball={x:c.width/2,y:c.height/2,vx:BS*d,vy:BS*(Math.random()>.5?1:-1)};}
  function draw(c,W,H){const ctx=c.getContext('2d');ctx.fillStyle='#06040a';ctx.fillRect(0,0,W,H);
    ctx.setLineDash([6,6]);ctx.strokeStyle='#1a0a2a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#d4b866';ctx.fillRect(PW,pl.y,PW,PH);ctx.fillRect(W-PW*2,pr.y,PW,PH);
    ctx.fillStyle='#f0f0ff';ctx.beginPath();ctx.arc(ball.x,ball.y,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d4b866';ctx.font='bold 26px Cinzel,serif';ctx.textAlign='center';ctx.fillText(`${sc.l}  :  ${sc.r}`,W/2,28);
    if(!running){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);}}
  window.pongRestart=pongRestart;
})();

/* ═══════════════════════ TIC TAC TOE ═══════════════════════ */
(function(){
  let board,player,gameOver;
  const WIN=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function tttRestart(){board=Array(9).fill('');player='X';gameOver=false;document.getElementById('ttt-status').textContent='Ruch gracza X';renderTTT();}
  function renderTTT(){const el=document.getElementById('ttt-board');el.innerHTML='';board.forEach((v,i)=>{const cell=document.createElement('div');cell.className='ttt-cell'+(v?' '+v.toLowerCase():'');cell.textContent=v;if(!v&&!gameOver)cell.onclick=()=>tttMove(i);el.appendChild(cell);});}
  function tttMove(i){if(board[i]||gameOver)return;board[i]=player;const w=checkWin();if(w){gameOver=true;document.getElementById('ttt-status').textContent=`Wygrywa ${player}! 🏆`;highlight(w);return;}if(board.every(v=>v)){gameOver=true;document.getElementById('ttt-status').textContent='Remis!';renderTTT();return;}player=player==='X'?'O':'X';document.getElementById('ttt-status').textContent=`Ruch gracza ${player}`;renderTTT();}
  function checkWin(){for(const c of WIN)if(board[c[0]]&&board[c[0]]===board[c[1]]&&board[c[1]]===board[c[2]])return c;return null;}
  function highlight(combo){renderTTT();const cells=document.getElementById('ttt-board').children;combo.forEach(i=>{cells[i].style.background='#2a1a04';cells[i].style.boxShadow='0 0 12px #d4b86688';});}
  window.tttRestart=tttRestart;
})();

/* ═══════════════════════════════════════════════════════════
   GRA 4: WILK I ZAJĄC — retro platformer
   Zając (gracz) biega po platformach, zbiera marchewki.
   Wilk goni zająca. Strać wszystkie życia = koniec.
   Dotknięcie wilka = -1 życie + chwilowa nietykalność.
═══════════════════════════════════════════════════════════ */
(function(){
  const CW=480,CH=300,GRAV=0.5,JUMP=-11,SPD=3.5,TILE=24;
  let rabbit,wolf,carrots,score,lives,animId,running,keys={};
  let invincible=0; // frames of invincibility after hit

  // Platform layout: [x, y, width] in tile units
  const PLATFORMS=[
    [0,11,20],   // ground
    [1,8,4],[6,7,3],[11,8,4],[15,7,3],  // row 1
    [2,5,3],[8,5,4],[13,5,3],           // row 2
    [4,3,4],[10,3,3],                   // row 3
    [7,1,6],                            // top
  ];

  function px(tx){return tx*TILE;}
  function py(ty){return ty*TILE;}

  function wrRestart(){
    const c=document.getElementById('wr-canvas');c.width=CW;c.height=CH;
    rabbit={x:px(1),y:py(9),vx:0,vy:0,w:20,h:22,onGround:false,dir:1};
    wolf={x:px(14),y:py(9),vx:-1.2,vy:0,w:22,h:24,onGround:false,dir:-1,timer:0};
    score=0;lives=3;running=true;invincible=0;
    // place carrots on platforms (skip ground)
    carrots=[];
    PLATFORMS.slice(1).forEach(([tx,ty,tw])=>{
      const cx=px(tx)+px(tw)/2-6;const cy=py(ty)-18;
      carrots.push({x:cx,y:cy,w:12,h:18,collected:false});
    });
    document.getElementById('wr-status').textContent='← → ruch  •  ↑ / spacja = skok  •  Zbierz marchewki!';
    keys={};cancelAnimationFrame(animId);wrLoop();
  }

  document.addEventListener('keydown',e=>{if(!document.getElementById('v-wr').classList.contains('hidden')){keys[e.key]=true;if([' ','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();}});
  document.addEventListener('keyup',e=>{keys[e.key]=false;});

  function getPlats(){return PLATFORMS.map(([tx,ty,tw])=>({x:px(tx),y:py(ty),w:px(tw),h:8}));}

  function applyPhysics(ent){
    ent.vy+=GRAV;ent.x+=ent.vx;ent.y+=ent.vy;ent.onGround=false;
    const plats=getPlats();
    for(const p of plats){
      if(ent.x+ent.w>p.x&&ent.x<p.x+p.w){
        if(ent.y+ent.h>=p.y&&ent.y+ent.h<=p.y+p.h+ent.vy+2&&ent.vy>=0){
          ent.y=p.y-ent.h;ent.vy=0;ent.onGround=true;
        }
      }
    }
    if(ent.x<0)ent.x=0;if(ent.x+ent.w>CW)ent.x=CW-ent.w;
    if(ent.y>CH+40){ent.y=py(9);ent.vy=0;} // fall reset
  }

  function wolfAI(){
    wolf.timer++;
    // simple chase: move toward rabbit horizontally, jump when blocked
    const dx=rabbit.x-wolf.x;
    wolf.vx=dx>0?Math.min(1.5,wolf.vx+0.06):Math.max(-1.5,wolf.vx-0.06);
    wolf.dir=dx>0?1:-1;
    // jump if rabbit is above and wolf is on ground
    if(wolf.onGround&&rabbit.y<wolf.y-30&&Math.abs(dx)<120){wolf.vy=JUMP*0.85;}
    // occasionally jump to avoid getting stuck
    if(wolf.onGround&&wolf.timer%90===0)wolf.vy=JUMP*0.7;
    applyPhysics(wolf);
  }

  function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

  function wrLoop(){
    animId=requestAnimationFrame(wrLoop);
    if(!running)return;
    // rabbit input
    if(keys['ArrowLeft']||keys['a']){rabbit.vx=-SPD;rabbit.dir=-1;}
    else if(keys['ArrowRight']||keys['d']){rabbit.vx=SPD;rabbit.dir=1;}
    else rabbit.vx*=0.7;
    if((keys['ArrowUp']||keys[' ']||keys['w'])&&rabbit.onGround){rabbit.vy=JUMP;}
    applyPhysics(rabbit);
    wolfAI();
    if(invincible>0)invincible--;
    // collect carrots
    carrots.forEach(car=>{if(!car.collected&&overlap(rabbit,car)){car.collected=true;score++;document.getElementById('wr-status').textContent=`Marchewki: ${score} / ${carrots.length}   Życia: ${'❤️'.repeat(lives)}`;if(score===carrots.length){running=false;document.getElementById('wr-status').textContent='🐇 Wszystkie marchewki zebrane! Wygrywasz! 🏆';};}});
    // wolf hit
    if(invincible===0&&overlap(rabbit,wolf)){lives--;invincible=90;if(lives<=0){running=false;document.getElementById('wr-status').textContent='🐺 Wilk złapał zająca! Koniec gry!';}else{document.getElementById('wr-status').textContent=`Łapka! Marchewki: ${score}   Życia: ${'❤️'.repeat(lives)}`;}}
    draw();
  }

  function draw(){
    const c=document.getElementById('wr-canvas'),ctx=c.getContext('2d');
    // sky
    ctx.fillStyle='#0a0818';ctx.fillRect(0,0,CW,CH);
    // stars
    ctx.fillStyle='#ffffff22';
    [[40,20],[120,45],[200,15],[300,35],[400,25],[60,80],[380,70],[250,55]].forEach(([sx,sy])=>{ctx.fillRect(sx,sy,2,2);});

    // platforms
    const plats=getPlats();
    plats.forEach((p,i)=>{
      ctx.fillStyle=i===0?'#3a2a0a':'#5a3e18';
      ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle=i===0?'#2a8a20':'#4a8a30';
      ctx.fillRect(p.x,p.y,p.w,4);
    });

    // carrots
    carrots.forEach(car=>{
      if(car.collected)return;
      // body
      ctx.fillStyle='#e06820';ctx.fillRect(car.x+3,car.y+6,6,12);
      ctx.fillStyle='#d05010';ctx.fillRect(car.x+4,car.y+7,4,10);
      // top leaves
      ctx.fillStyle='#30a030';
      ctx.fillRect(car.x+5,car.y,2,7);
      ctx.fillRect(car.x+2,car.y+2,3,5);
      ctx.fillRect(car.x+7,car.y+2,3,5);
    });

    // wolf
    const wd=wolf.dir;
    ctx.save();if(wd<0){ctx.translate(wolf.x+wolf.w,wolf.y);ctx.scale(-1,1);}else{ctx.translate(wolf.x,wolf.y);}
    // body
    ctx.fillStyle='#5a5060';ctx.fillRect(0,6,22,16);
    // head
    ctx.fillStyle='#6a6070';ctx.fillRect(12,0,12,14);
    // ear
    ctx.fillStyle='#5a5060';ctx.fillRect(20,0,4,7);
    // snout
    ctx.fillStyle='#8a7080';ctx.fillRect(18,6,6,6);
    // nose
    ctx.fillStyle='#303030';ctx.fillRect(22,8,2,2);
    // eye
    ctx.fillStyle='#ff2020';ctx.fillRect(16,3,3,3);
    // legs
    ctx.fillStyle='#4a4050';
    ctx.fillRect(2,20,5,6);ctx.fillRect(9,20,5,6);ctx.fillRect(14,18,5,6);
    // tail
    ctx.fillStyle='#6a6070';ctx.fillRect(0,8,5,5);
    ctx.restore();

    // rabbit (blink when invincible)
    if(invincible===0||Math.floor(invincible/6)%2===0){
      const rd=rabbit.dir;
      ctx.save();if(rd<0){ctx.translate(rabbit.x+rabbit.w,rabbit.y);ctx.scale(-1,1);}else{ctx.translate(rabbit.x,rabbit.y);}
      // body
      ctx.fillStyle='#d0d0c8';ctx.fillRect(2,8,16,14);
      // head
      ctx.fillStyle='#e0e0d8';ctx.fillRect(8,0,12,12);
      // ear
      ctx.fillStyle='#e0e0d8';ctx.fillRect(10,0,4,10);
      ctx.fillStyle='#f0a0a8';ctx.fillRect(11,1,2,8);
      ctx.fillRect(15,0,4,10);ctx.fillStyle='#f0a0a8';ctx.fillRect(16,1,2,8);
      // eye
      ctx.fillStyle='#303040';ctx.fillRect(14,3,3,3);
      ctx.fillStyle='#ffffff';ctx.fillRect(15,3,1,1);
      // nose
      ctx.fillStyle='#f08090';ctx.fillRect(18,7,2,2);
      // tail
      ctx.fillStyle='#ffffff';ctx.fillRect(0,10,6,6);ctx.beginPath();ctx.arc(3,13,4,0,Math.PI*2);ctx.fill();
      // legs
      ctx.fillStyle='#d0d0c8';ctx.fillRect(3,20,5,4);ctx.fillRect(10,20,5,4);
      ctx.restore();
    }

    // HUD
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,CW,20);
    ctx.fillStyle='#d4b866';ctx.font='12px Cinzel,serif';ctx.textAlign='left';
    ctx.fillText(`🥕 ${score}/${carrots.length}`,8,14);
    ctx.textAlign='right';ctx.fillText(`${'❤️'.repeat(lives)}`,CW-8,14);

    if(!running){
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,CW,CH);
      ctx.fillStyle='#d4b866';ctx.font='bold 22px Cinzel,serif';ctx.textAlign='center';
      ctx.fillText(lives<=0?'KONIEC GRY':'WYGRAŁEŚ! 🏆',CW/2,CH/2);
    }
  }

  window.wrRestart=wrRestart;
})();

buildBoard();
renderStrip();
</script>
