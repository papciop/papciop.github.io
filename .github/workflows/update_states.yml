name: Update HA States
on:
  repository_dispatch:
    types: [ha_state_update]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Save JSON data
        run: |
          echo '${{ toJSON(github.event.client_payload) }}' > data.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "papciop"
          git config --global user.email "ha-bot@users.noreply.github.com"
          git add data.json
          
          TIMESTAMP="${{ github.event.client_payload.aktualizacja }}"
          
          git diff-index --quiet HEAD || git commit -m "Raport $TIMESTAMP"
          git push
