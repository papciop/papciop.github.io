<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tanki</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;background:#050a14;font-family:'Courier New',monospace;overflow:hidden;touch-action:none;}
    
    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding: 10px;
    }
    
    #ui{
      display:flex;
      gap:15px;
      color:#00d4ff;
      font-size:16px;
      letter-spacing:0.1em;
      justify-content:center;
      align-items:center;
      width: 100%;
      margin-bottom: 10px;
    }
    #ui span b{color:#c8a84b;}
    
    .gp-pause{
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,212,255,0.3);
      color:#00d4ff;
      font-size:14px;
      border-radius:4px;
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      z-index: 10;
    }

    #wrap {
      position: relative;
      width: 85vh;
      height: 85vh;
      max-width: 100%;
    }
    
    canvas{
      border:3px solid rgba(0,212,255,0.4);
      border-radius:6px;
      box-shadow:0 0 30px rgba(0,212,255,0.2);
      background:#050a14;
      display:block;
      width: 100%;
      height: 100%;
    }
    
    #overlay{
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
      background:rgba(5,10,20,0.95);
      border-radius:4px;
      overflow-y:auto;
      padding: 15px;
    }
    #overlay h2{font-size:32px;letter-spacing:0.2em;color:#c8a84b;}
    #overlay p{font-size:14px;color:#8899aa;}
    .legend{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;font-size:11px;}
    .leg{color:#8899aa;}
    button{padding:10px 25px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;font-family:'Courier New',monospace;cursor:pointer;border-radius:4px;}
    
    /* INTERFEJS MOBILNY (DOMYŚLNIE UKRYTY NA PC) */
    #mobile-fire-panel, #mobile-move-panel {
      display: none;
    }
    
    .gp-row{display:flex;gap:8px;justify-content:center;}
    .gpbtn{
      width:65px;
      height:55px;
      background:rgba(0,212,255,0.12);
      border:2px solid rgba(0,212,255,0.35);
      color:#00d4ff;
      font-size:26px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      -webkit-user-select:none;
    }
    .gpbtn:active{background:rgba(0,212,255,0.35);}
    .gpbtn.fire{width:95px;height:55px;background:rgba(255,50,50,0.15);border-color:rgba(255,80,80,0.5);color:#ff5555;font-size:13px;font-weight:bold;}
    .gpbtn.fire:active{background:rgba(255,50,50,0.4);}
    
    #ranking{width:100%;max-width:400px;font-size:11px;}
    #ranking table{width:100%;border-collapse:collapse;color:#8899aa;}
    #ranking th{color:#c8a84b;padding:4px;border-bottom:1px solid rgba(0,212,255,0.2);}
    #ranking td{padding:4px;}
    #ranking tr.me td{color:#00d4ff;}
    #nickInput{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;padding:6px;border-radius:4px;text-align:center;}

    /* TELEFONY (PIONOWO) */
    @media(max-width: 767px) and (orientation: portrait) {
      body { justify-content: flex-start; padding-top: 40px; }
      #wrap {
        width: 96vw;
        height: 96vw;
        margin-bottom: 20px;
      }
      /* Układ dolny w pionie */
      #mobile-fire-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: fixed;
        bottom: 20px;
        left: 15px;
      }
      #mobile-move-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: fixed;
        bottom: 20px;
        right: 15px;
      }
    }

    /* TELEFONY (POZIOMO - LANDSCAPE) */
    @media(max-width: 950px) and (orientation: landscape) {
      body {
        position: relative;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        padding: 5px;
        height: 100vh;
        width: 100vw;
      }
      #ui { 
        position: absolute;
        top: 5px;
        left: 50%;
        transform: translateX(-50%);
        width: auto; 
        font-size: 14px; 
        z-index: 5;
      }
      #wrap {
        width: 75vh;
        height: 75vh;
        margin: 0 auto;
      }
      
      /* SZTYWNE PRZYKLEJENIE DO LEWEJ KRAWĘDZI DLA KCIUKA */
      #mobile-fire-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }
      
      /* SZTYWNE PRZYKLEJENIE DO PRAWEJ KRAWĘDZI DLA KCIUKA */
      #mobile-move-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }
      
      .gpbtn { width: 60px; height: 52px; font-size: 22px; }
      .gpbtn.fire { width: 95px; height: 52px; }
    }
  </style>
</head>
<body>

<div id="gPause" class="gp-pause">⏸</div>

<div id="ui">
  <span>ŻYCIA: <b id="ulives">3</b></span>
  <span>WYNIK: <b id="uscore">0</b></span>
  <span>POZIOM: <b id="ulevel">1</b></span>
  <span>WROGÓW: <b id="uenemies">0</b></span>
  <span id="ubonus"></span>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h2>⚙ TANKI</h2>
    <p>Strzałki = ruch &nbsp;|&nbsp; Spacja = strzał &nbsp;|&nbsp; Esc = pauza</p>
    <div class="legend">
      <span class="leg">🟩 ZIELONY 1♥</span><span class="leg">🟨 ŻÓŁTY 2♥</span><span class="leg">⬜ BIAŁY 3♥</span><span class="leg">🟥 CZERWONY 4♥</span>
    </div>
    <div class="legend">
      <span class="leg">🌿 Krzaki</span><span class="leg">💧 Woda</span><span class="leg">💥 Mina</span>
    </div>
    <div class="legend">
      <span class="leg">⛵ Ponton</span><span class="leg">🛡 Pancerz</span><span class="leg">⚡ Paliwo</span><span class="leg">⭐ Gwiazda</span><span class="leg">💣 Skałobójca</span><span class="leg">🎯 Detonator</span>
    </div>
    <input id="nickInput" type="text" maxlength="12" placeholder="Twój nick" autocomplete="off">
    <button id="startBtn">▶ ZAGRAJ</button>
    <div id="ranking"></div>
  </div>
</div>

<div id="mobile-fire-panel">
  <div class="gp-row"><button class="gpbtn fire" id="gFire">STRZAŁ</button></div>
  <div class="gp-row"><button class="gpbtn fire" id="gFire2">🔫</button></div>
</div>

<div id="mobile-move-panel">
  <div class="gp-row"><button class="gpbtn" id="gUp">▲</button></div>
  <div class="gp-row"><button class="gpbtn" id="gLeft">◀</button><button class="gpbtn" id="gRight">▶</button></div>
  <div class="gp-row"><button class="gpbtn" id="gDown">▼</button></div>
</div>

<script>
const CV=document.getElementById('c'), ctx=CV.getContext('2d');
const overlay=document.getElementById('overlay');
const uLives=document.getElementById('ulives'),uScore=document.getElementById('uscore'),uLevel=document.getElementById('ulevel'),uEnemies=document.getElementById('uenemies'),uBonus=document.getElementById('ubonus');
const nickInput=document.getElementById('nickInput');

const CELL=32, COLS=15, ROWS=15;
CV.width=COLS*CELL; CV.height=ROWS*CELL;

const keys={};
function bindTouch(id, keyName) {
  const btn = document.getElementById(id);
  if(!btn) return;
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
}
bindTouch('gUp', 'ArrowUp');
bindTouch('gDown', 'ArrowDown');
bindTouch('gLeft', 'ArrowLeft');
bindTouch('gRight', 'ArrowRight');
bindTouch('gFire', ' ');
bindTouch('gFire2', ' ');

function togglePause() {
  if(running) paused = !paused;
}
document.getElementById('gPause').addEventListener('touchstart', (e) => { e.preventDefault(); togglePause(); });
document.getElementById('gPause').addEventListener('click', togglePause);

const T={EMPTY:0,BRICK:1,STEEL:2,BASE:3,BUSH:4,WATER:5};
const TANK_COLORS=['#44bb44','#ddcc22','#cccccc','#dd3333'];
const PICKUP_TYPES=['ponton','shield','fuel','star','rockbuster','detonator'];

let map,player,enemies,bullets,pickups,mines,score,lives,level,running,frameId,spawnQ,spawnTimer,paused;

function getScores(){ try{return JSON.parse(localStorage.getItem('tanki_scores')||'[]');}catch{return[];} }
function saveScore(nick,sc){
  let arr=getScores();
  arr.push({nick:nick||'???',score:sc,date:new Date().toLocaleDateString('pl')});
  arr.sort((a,b)=>b.score-a.score);
  arr=arr.slice(0,10);
  localStorage.setItem('tanki_scores',JSON.stringify(arr));
  return arr;
}
function renderRanking(highlight){
  const arr=getScores();
  const el=document.getElementById('ranking');
  if(!arr.length){el.innerHTML='';return;}
  let rows=arr.map((e,i)=>`<tr class="${i===highlight?'me':''}"><td>${i+1}</td><td>${e.nick}</td><td>${e.score}</td><td>${e.date}</td></tr>`).join('');
  el.innerHTML=`<table><tr><th>#</th><th>Nick</th><th>Wynik</th><th>Data</th></tr>${rows}</table>`;
}

function makeMap(lvl){
  let m,att=0;
  do{m=tryMakeMap(lvl);att++;}while(!isPlayable(m)&&att<20);
  return m;
}
function tryMakeMap(lvl){
  const m=Array.from({length:ROWS},()=>Array(COLS).fill(T.EMPTY));
  const cx=Math.floor(COLS/2);
  m[ROWS-1][cx]=T.BASE;
  [[ROWS-2,cx-1],[ROWS-2,cx],[ROWS-2,cx+1],[ROWS-1,cx-1],[ROWS-1,cx+1]].forEach(([r,c])=>{if(r>=0&&c>=0&&c<COLS)m[r][c]=T.BRICK;});
  for(let r=ROWS-3;r<ROWS;r++) for(let c=0;c<3;c++) m[r][c]=T.EMPTY;
  for(let r=0;r<3;r++){m[r][0]=T.EMPTY;m[r][1]=T.EMPTY;m[r][COLS-1]=T.EMPTY;m[r][COLS-2]=T.EMPTY;}
  for(let r=0;r<3;r++) for(let c=cx-1;c<=cx+1;c++) if(c>=0&&c<COLS) m[r][c]=T.EMPTY;
  const density=0.18+lvl*0.012;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(m[r][c]!==T.EMPTY) continue;
    if(Math.random()<density){
      const rnd=Math.random();
      if(rnd<0.5) m[r][c]=T.BRICK;
      else if(rnd<0.62) m[r][c]=T.STEEL;
      else if(rnd<0.78) m[r][c]=T.BUSH;
      else m[r][c]=T.WATER;
    }
  }
  return m;
}
function isPlayable(m){
  const visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const q=[[ROWS-1,0]]; visited[ROWS-1][0]=true; let cnt=0;
  while(q.length){const[r,c]=q.shift();cnt++;for(const[dr,dc] of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||visited[nr][nc]) continue;const t=m[nr][nc];if(t===T.BRICK||t===T.STEEL||t===T.BASE||t===T.WATER) continue;visited[nr][nc]=true;q.push([nr,nc]);}}
  return cnt>=ROWS*COLS*0.3;
}

function makeTank(col,row,isPlayer){
  const armour=isPlayer?0:pickArmour(level);
  return{x:col*CELL,y:row*CELL,dir:'up',speed:isPlayer?1.75:1.05,hp:armour+1,armour,isPlayer,hasPonton:false,hasFuel:false,hasShield:false,shieldHits:0,rockAmmo:0,alive:true,shootCd:0,aiTimer:0,aiDir:'down'};
}
function pickArmour(lvl){const r=Math.random();if(lvl<=1)return r<0.7?0:1;if(lvl<=3)return r<0.5?0:r<0.8?1:2;return r<0.3?0:r<0.6?1:r<0.85?2:3;}

function tileAt(px,py){const c=Math.floor(px/CELL),r=Math.floor(py/CELL);if(c<0||c>=COLS||r<0||r>=ROWS)return T.STEEL;return map[r][c];}
function isSolid(px,py,hasPonton){const t=tileAt(px,py);if(t===T.BRICK||t===T.STEEL||t===T.BASE)return true;if(t===T.WATER&&!hasPonton)return true;return false;}
function canMove(tank,dx,dy){const s=CELL-8,nx=tank.x+dx,ny=tank.y+dy;return[[nx,ny],[nx+s,ny],[nx,ny+s],[nx+s,ny+s]].every(([px,py])=>!isSolid(px,py,tank.hasPonton));}

function spawnMines(count){
  for(let i=0;i<count;i++){
    let r,c,tries=0;
    do{r=2+Math.floor(Math.random()*(ROWS-4));c=Math.floor(Math.random()*COLS);tries++;}
    while((map[r][c]!==T.EMPTY&&map[r][c]!==T.BUSH)&&tries<30);
    mines.push({x:c*CELL,y:r*CELL,alive:true,blink:0});
  }
}
function updateMines(){
  mines.forEach(mine=>{
    if(!mine.alive) return;
    mine.blink++;
    const checkTank=(tank)=>{
      if(!tank.alive) return;
      if(Math.abs(tank.x-mine.x)<CELL-4&&Math.abs(tank.y-mine.y)<CELL-4){
        mine.alive=false;
        if(tank.hasShield&&tank.shieldHits>0){tank.shieldHits--;if(tank.shieldHits===0)tank.hasShield=false;return;}
        if(tank.isPlayer){
          tank.alive=false; lives--; uLives.textContent=lives;
          if(lives<=0){setTimeout(()=>endGame(false),400);}
          else setTimeout(()=>{player.x=0;player.y=(ROWS-1)*CELL;player.alive=true;player.hasPonton=false;player.hasFuel=false;player.hasShield=false;},800);
        } else {
          tank.alive=false; score+=100*(tank.armour+1); uScore.textContent=score;
        }
      }
    };
    checkTank(player);
    enemies.forEach(e=>checkTank(e));
  });
  mines=mines.filter(m=>m.alive);
}

function spawnPickup(){
  let r,c,tries=0;
  do{r=Math.floor(Math.random()*ROWS);c=Math.floor(Math.random()*COLS);tries++;}
  while((map[r][c]!==T.EMPTY&&map[r][c]!==T.BUSH)&&tries<40);
  const type=PICKUP_TYPES[Math.floor(Math.random()*PICKUP_TYPES.length)];
  pickups.push({x:c*CELL,y:r*CELL,type,alive:true,timer:600});
}
function applyPickup(tank,p){
  p.alive=false;
  if(p.type==='ponton') tank.hasPonton=true;
  if(p.type==='shield'){tank.hasShield=true;tank.shieldHits=2;}
  if(p.type==='fuel') tank.hasFuel=true;
  if(p.type==='rockbuster') tank.rockAmmo+=10;
  if(p.type==='detonator'&&tank.isPlayer){
    const alive=enemies.filter(e=>e.alive);
    if(alive.length){const t=alive[Math.floor(Math.random()*alive.length)];t.alive=false;score+=100*(t.armour+1);uScore.textContent=score;}
  }
  if(p.type==='star'&&tank.isPlayer){enemies.forEach(e=>e.alive=false);score+=enemies.length*50;uScore.textContent=score;}
  if(tank.isPlayer) showBonus(p.type);
}
function showBonus(type){
  const names={ponton:'⛵ PONTON',shield:'🛡 PANCERZ',fuel:'⚡ PALIWO',star:'⭐ GWIAZDA!',rockbuster:'💣 SKAŁOBÓJCA x10',detonator:'🎯 DETONATOR!'};
  uBonus.textContent=names[type]||'';
  clearTimeout(uBonus._t);
  uBonus._t=setTimeout(()=>uBonus.textContent='',2500);
}

function init(){
  score=parseInt(uScore.textContent)||0;
  lives=parseInt(uLives.textContent)||3;
  level=parseInt(uLevel.textContent)||1;
  map=makeMap(level);
  player=makeTank(0,ROWS-1,true); player.dir='up';
  enemies=[]; bullets=[]; pickups=[]; mines=[];
  paused=false;
  spawnQ=4+level*2; spawnTimer=100;
  uEnemies.textContent=spawnQ;
  spawnMines(Math.min(1+Math.floor(level/2), 5));
  running=true;
  if(frameId) cancelAnimationFrame(frameId);
  loop();
}

function spawnEnemy(){
  if(spawnQ<=0||enemies.length>=5) return;
  const cols=[0,Math.floor(COLS/2),COLS-1];
  const c=cols[Math.floor(Math.random()*cols.length)];
  const e=makeTank(c,0,false); e.dir='down'; e.aiDir='down';
  enemies.push(e); spawnQ--;
  uEnemies.textContent=spawnQ+enemies.length;
}

function updatePlayer(){
  if(!player.alive) return;
  const spd=player.hasFuel?player.speed*1.6:player.speed;
  if(keys['ArrowUp'])   {player.dir='up';   if(canMove(player,0,-spd))player.y-=spd;}
  if(keys['ArrowDown']) {player.dir='down'; if(canMove(player,0,spd))player.y+=spd;}
  if(keys['ArrowLeft']) {player.dir='left'; if(canMove(player,-spd,0))player.x-=spd;}
  if(keys['ArrowRight']){player.dir='right';if(canMove(player,spd,0))player.x+=spd;}
  player.x=Math.max(0,Math.min(CV.width-CELL,player.x));
  player.y=Math.max(0,Math.min(CV.height-CELL,player.y));
  if(player.shootCd>0) player.shootCd--;
  if(keys[' ']&&player.shootCd===0) shoot(player);
}

const DV={up:{dx:0,dy:-1},down:{dx:0,dy:1},left:{dx:-1,dy:0},right:{dx:1,dy:0}};
function shoot(tank){
  const d=DV[tank.dir];
  const isRock=tank.rockAmmo>0;
  if(isRock) tank.rockAmmo--;
  const power=isRock?99:(tank.armour+1);
  bullets.push({x:tank.x+CELL/2-3,y:tank.y+CELL/2-3,dx:d.dx*6,dy:d.dy*6,fromPlayer:tank.isPlayer,power,isRock,alive:true});
  tank.shootCd=tank.isPlayer?20:50;
}

function updateEnemies(){
  enemies.forEach(e=>{
    if(!e.alive) return;
    e.aiTimer++;
    const spd=e.hasFuel?e.speed*1.5:e.speed;
    if(e.aiTimer%70===0||!canMove(e,DV[e.aiDir].dx*spd,DV[e.aiDir].dy*spd)){
      const target=Math.random()<0.6?player:{x:Math.floor(COLS/2)*CELL,y:(ROWS-1)*CELL};
      const dx=target.x-e.x,dy=target.y-e.y;
      if(Math.abs(dx)>Math.abs(dy)) e.aiDir=dx>0?'right':'left';
      else e.aiDir=dy>0?'down':'up';
      if(!canMove(e,DV[e.aiDir].dx*spd,DV[e.aiDir].dy*spd)){
        const dirs=['up','down','left','right'];
        for(let i=0;i<4;i++){const d=dirs[Math.floor(Math.random()*4)];if(canMove(e,DV[d].dx*spd,DV[d].dy*spd)){e.aiDir=d;break;}}
      }
    }
    e.dir=e.aiDir;
    const d=DV[e.dir];
    if(canMove(e,d.dx*spd,d.dy*spd)){e.x+=d.dx*spd;e.y+=d.dy*spd;}
    e.x=Math.max(0,Math.min(CV.width-CELL,e.x));
    e.y=Math.max(0,Math.min(CV.height-CELL,e.y));
    if(e.shootCd>0) e.shootCd--;
    if(e.shootCd===0&&Math.random()<0.012) shoot(e);
    pickups.forEach(p=>{if(!p.alive)return;if(Math.abs(e.x-p.x)<CELL&&Math.abs(e.y-p.y)<CELL)applyPickup(e,p);});
  });
}

function updateBullets(){
  for(let i=0;i<bullets.length;i++){
    if(!bullets[i].alive) continue;
    for(let j=i+1;j<bullets.length;j++){
      if(!bullets[j].alive||bullets[i].fromPlayer===bullets[j].fromPlayer) continue;
      if(Math.hypot(bullets[i].x-bullets[j].x,bullets[i].y-bullets[j].y)>12) continue;
      if(bullets[i].power===bullets[j].power){bullets[i].alive=false;bullets[j].alive=false;}
      else if(bullets[i].power>bullets[j].power){bullets[i].power-=bullets[j].power;bullets[j].alive=false;}
      else{bullets[j].power-=bullets[i].power;bullets[i].alive=false;}
    }
  }
  bullets.forEach(b=>{
    if(!b.alive) return;
    b.x+=b.dx; b.y+=b.dy;
    if(b.x<0||b.x>CV.width||b.y<0||b.y>CV.height){b.alive=false;return;}
    const tc=Math.floor((b.x+3)/CELL),tr=Math.floor((b.y+3)/CELL);
    if(tc>=0&&tc<COLS&&tr>=0&&tr<ROWS){
      const t=map[tr][tc];
      if(t===T.BRICK){map[tr][tc]=T.EMPTY;b.alive=false;return;}
      if(t===T.STEEL){if(b.isRock)map[tr][tc]=T.EMPTY;b.alive=false;return;}
      if(t===T.BASE){endGame(false);b.alive=false;return;}
    }
    if(b.fromPlayer){
      enemies.forEach(e=>{
        if(!e.alive||!b.alive) return;
        if(b.x>e.x&&b.x<e.x+CELL&&b.y>e.y&&b.y<e.y+CELL){
          b.alive=false;
          if(e.hasShield&&e.shieldHits>0){e.shieldHits--;if(e.shieldHits===0)e.hasShield=false;return;}
          e.hp--;
          if(e.hp<=0){e.alive=false;score+=100*(e.armour+1);uScore.textContent=score;}
          else e.armour=Math.max(0,e.armour-1);
        }
      });
    } else {
      if(player.alive&&b.x>player.x&&b.x<player.x+CELL&&b.y>player.y&&b.y<player.y+CELL){
        b.alive=false;
        if(player.hasShield&&player.shieldHits>0){player.shieldHits--;if(player.shieldHits===0)player.hasShield=false;return;}
        player.alive=false; lives--; uLives.textContent=lives;
        if(lives<=0){setTimeout(()=>endGame(false),400);}
        else setTimeout(()=>{player.x=0;player.y=(ROWS-1)*CELL;player.alive=true;player.hasPonton=false;player.hasFuel=false;player.hasShield=false;},800);
      }
    }
  });
  bullets=bullets.filter(b=>b.alive);
  enemies=enemies.filter(e=>e.alive);
  uEnemies.textContent=spawnQ+enemies.length;
  if(enemies.length===0&&spawnQ===0) setTimeout(()=>nextLevel(),700);
}

function updatePickups(){
  pickups.forEach(p=>{
    if(!p.alive) return;
    p.timer--;
    if(p.timer<=0){p.alive=false;return;}
    if(player.alive&&Math.abs(player.x-p.x)<CELL&&Math.abs(player.y-p.y)<CELL) applyPickup(player,p);
  });
  pickups=pickups.filter(p=>p.alive);
}

function nextLevel(){
  level++; uLevel.textContent=level;
  map=makeMap(level);
  player.x=0; player.y=(ROWS-1)*CELL; player.alive=true;
  player.hasPonton=false; player.hasFuel=false; player.hasShield=false;
  enemies=[]; bullets=[]; pickups=[]; mines=[];
  spawnQ=4+level*2; spawnTimer=100;
  uEnemies.textContent=spawnQ;
  spawnPickup();
  spawnMines(Math.min(1+Math.floor(level/2),6));
}

function endGame(win){
  running=false; cancelAnimationFrame(frameId);
  const nick=nickInput.value.trim()||'???';
  const arr=saveScore(nick,score);
  const hi=arr.findIndex(e=>e.nick===nick&&e.score===score);
  renderRanking(hi);
  overlay.innerHTML='';
  const div=document.createElement('div');
  div.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;';
  div.innerHTML=`<h2 style="color:#c8a84b;letter-spacing:0.2em">${win?'WYGRANA!':'KONIEC'}</h2><p style="color:#8899aa">Wynik: <b style="color:#00d4ff">${score}</b></p>`;
  const rankDiv=document.createElement('div');
  rankDiv.id='ranking';
  div.appendChild(rankDiv);
  const btn=document.createElement('button');
  btn.textContent='▶ ZAGRAJ PONOWNIE';
  btn.onclick=()=>{ uScore.textContent=0;uLives.textContent=3;uLevel.textContent=1;overlay.innerHTML='';overlay.appendChild(origOverlay);overlay.style.display='flex';renderRanking(); };
  div.appendChild(btn);
  overlay.appendChild(div);
  overlay.style.display='flex';
  const arr2=getScores();
  let rows=arr2.map((e,i)=>`<tr class="${i===hi?'me':''}"><td>${i+1}</td><td>${e.nick}</td><td>${e.score}</td><td>${e.date}</td></tr>`).join('');
  rankDiv.innerHTML=`<table><tr><th>#</th><th>Nick</th><th>Wynik</th><th>Data</th></tr>${rows}</table>`;
}
let origOverlay;

function drawTank(tank){
  if(!tank.alive) return;
  const x=tank.x,y=tank.y,s=CELL-6;
  const color=tank.isPlayer?'#00d4ff':TANK_COLORS[tank.armour];
  ctx.save();
  ctx.translate(x+s/2,y+s/2);
  const angles={up:0,down:Math.PI,left:-Math.PI/2,right:Math.PI/2};
  ctx.rotate(angles[tank.dir]);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=tank.isPlayer?8:4;
  ctx.fillRect(-s/2+3,-s/2+3,s-6,s-6); ctx.shadowBlur=0;
  ctx.fillStyle=color; ctx.fillRect(-2,-s/2+2,4,s/2-2);
  ctx.fillStyle=color+'88'; ctx.fillRect(-s/2+1,-s/2+3,3,s-6); ctx.fillRect(s/2-4,-s/2+3,3,s-6);
  if(tank.hasShield){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(0,0,s/2-1,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
  if(tank.hasFuel){ctx.fillStyle='#ffee00';ctx.fillRect(-2,s/2-6,4,4);}
  if(tank.rockAmmo>0){ctx.fillStyle='#ff6600';ctx.font='8px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tank.rockAmmo,0,s/2-3);}
  ctx.restore();
}
function draw(){
  ctx.fillStyle='#050a14'; ctx.fillRect(0,0,CV.width,CV.height);
  ctx.strokeStyle='rgba(0,212,255,0.03)'; ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,CV.height);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(CV.width,r*CELL);ctx.stroke();}
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const t=map[r][c],x=c*CELL,y=r*CELL;
    if(t===T.BRICK){ctx.fillStyle='#7a3010';ctx.fillRect(x+1,y+1,CELL-2,CELL-2);ctx.fillStyle='#9a4018';ctx.fillRect(x+2,y+2,CELL/2-2,CELL/2-2);ctx.fillRect(x+CELL/2+1,y+CELL/2+1,CELL/2-2,CELL/2-2);}
    else if(t===T.STEEL){ctx.fillStyle='#3a4a5a';ctx.fillRect(x+1,y+1,CELL-2,CELL-2);ctx.fillStyle='#5a7080';ctx.fillRect(x+3,y+3,8,8);ctx.fillRect(x+CELL/2+2,y+CELL/2+2,8,8);}
    else if(t===T.WATER){ctx.fillStyle='#0a2a4a';ctx.fillRect(x,y,CELL,CELL);ctx.fillStyle='rgba(0,120,220,0.4)';const wave=Math.sin(Date.now()/600+(c+r)*0.8)*2;ctx.fillRect(x+2,y+CELL/2+wave,CELL-4,4);}
    else if(t===T.BUSH){ctx.fillStyle='#1a3a12';ctx.fillRect(x,y,CELL,CELL);ctx.font=`${CELL-2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🌿',x+CELL/2,y+CELL/2);}
    else if(t===T.BASE){ctx.fillStyle='#c8a84b';ctx.shadowColor='#c8a84b';ctx.shadowBlur=12;ctx.font=`${CELL-4}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',x+CELL/2,y+CELL/2);ctx.shadowBlur=0;}
  }
  mines.forEach(mine=>{
    if(!mine.alive) return;
    const blink=Math.floor(mine.blink/20)%2;
    ctx.font=`${CELL-4}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.globalAlpha=blink?1:0.5;
    ctx.fillText('💥',mine.x+CELL/2,mine.y+CELL/2);
    ctx.globalAlpha=1;
  });
  pickups.forEach(p=>{
    if(!p.alive||Math.floor(p.timer/15)%2===0) return;
    const icons={ponton:'⛵',shield:'🛡',fuel:'⚡',star:'⭐',rockbuster:'💣',detonator:'🎯'};
    ctx.font=`${CELL-4}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(icons[p.type],p.x+CELL/2,p.y+CELL/2);
  });
  drawTank(player); enemies.forEach(drawTank);
  bullets.forEach(b=>{
    if(!b.alive)return;
    ctx.fillStyle=b.isRock?'#ff6600':b.fromPlayer?'#ffffff':'#ffaa00';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=6;ctx.fillRect(b.x,b.y,6,6);ctx.shadowBlur=0;
  });
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(map[r][c]!==T.BUSH) continue;
    const x=c*CELL,y=r*CELL;
    ctx.fillStyle='rgba(20,60,10,0.7)';ctx.fillRect(x,y,CELL,CELL);
    ctx.font=`${CELL}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.globalAlpha=0.85;ctx.fillText('🌿',x+CELL/2,y+CELL/2);ctx.globalAlpha=1;
  }
}

function loop(){
  if(!running) return;
  if(!paused){
    spawnTimer--;
    if(spawnTimer<=0&&spawnQ>0){spawnEnemy();spawnTimer=90;}
    if(Math.random()<0.0008&&pickups.length<3) spawnPickup();
    updatePlayer(); updateEnemies(); updateBullets(); updatePickups(); updateMines();
  }
  draw();
  frameId=requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;
  if(e.key==='Escape'&&running) paused=!paused;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

document.getElementById('startBtn').addEventListener('click',()=>{
  origOverlay=overlay.cloneNode(true);
  overlay.style.display='none';
  init();
});

renderRanking(-1);
ctx.fillStyle='#050a14';ctx.fillRect(0,0,CV.width,CV.height);
</script>
</body>
</html>
